<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>If Earth Could Talk (Radio Edit) | Omo Taker</title>
<meta name="theme-color" content="#05070d">

<style>
:root{
  --bg:#04060d;
  --text:#ffffff;
  --muted:rgba(233,240,255,.70);
  --muted-2:rgba(233,240,255,.52);
  --line:rgba(255,255,255,.12);
  --line-soft:rgba(255,255,255,.08);
  --glass:rgba(255,255,255,.055);
  --glass-2:rgba(255,255,255,.035);
  --blue:#62e6ff;
  --violet:#7b7dff;
  --pink:#ff63c6;
  --deep:#09111f;
  --glow:0 0 0 1px rgba(255,255,255,.05), 0 24px 80px rgba(0,0,0,.58);
  --blueGlow:0 12px 35px rgba(98,230,255,.20), 0 10px 30px rgba(123,125,255,.18);
}

*{
  box-sizing:border-box;
  margin:0;
  padding:0;
  font-family:Inter,system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;
  -webkit-tap-highlight-color:transparent;
}

html{
  scroll-behavior:smooth;
}

body{
  min-height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  padding:26px 16px;
  color:var(--text);
  background:
    radial-gradient(circle at 15% 18%, rgba(82,105,255,.24), transparent 32%),
    radial-gradient(circle at 85% 78%, rgba(255,99,198,.18), transparent 30%),
    radial-gradient(circle at 78% 12%, rgba(98,230,255,.16), transparent 26%),
    linear-gradient(180deg,#020309 0%, #07111d 45%, #04060d 100%);
  overflow-x:hidden;
}

body::before{
  content:"";
  position:fixed;
  inset:-20%;
  background:
    radial-gradient(circle at 50% 50%, rgba(255,255,255,.03), transparent 35%),
    linear-gradient(115deg, transparent 35%, rgba(98,230,255,.06) 50%, transparent 65%);
  filter:blur(20px);
  pointer-events:none;
  animation:floatAura 12s ease-in-out infinite;
}

.wrap{
  position:relative;
  width:100%;
  max-width:430px;
  padding:18px;
  border-radius:34px;
  background:
    linear-gradient(180deg, rgba(255,255,255,.08), rgba(255,255,255,.03)),
    linear-gradient(135deg, rgba(98,230,255,.06), rgba(255,99,198,.04));
  border:1px solid rgba(255,255,255,.12);
  backdrop-filter:blur(24px) saturate(150%);
  -webkit-backdrop-filter:blur(24px) saturate(150%);
  box-shadow:var(--glow);
  text-align:center;
  overflow:hidden;
}

.wrap::before{
  content:"";
  position:absolute;
  inset:0;
  background:
    linear-gradient(135deg, rgba(98,230,255,.07), transparent 30%, transparent 70%, rgba(255,99,198,.07)),
    radial-gradient(circle at 50% 100%, rgba(255,99,198,.08), transparent 34%);
  pointer-events:none;
}

.wrap::after{
  content:"";
  position:absolute;
  top:-120px;
  left:50%;
  transform:translateX(-50%);
  width:260px;
  height:260px;
  border-radius:50%;
  background:radial-gradient(circle, rgba(98,230,255,.16), transparent 62%);
  filter:blur(30px);
  pointer-events:none;
}

.top-line{
  width:118px;
  height:6px;
  border-radius:999px;
  margin:2px auto 20px;
  background:linear-gradient(90deg, rgba(255,255,255,.18), rgba(98,230,255,.32), rgba(255,255,255,.18));
  box-shadow:0 0 24px rgba(98,230,255,.14);
}

.brand{
  position:relative;
  z-index:1;
  margin-bottom:16px;
}

.brand b{
  display:block;
  font-size:16px;
  font-weight:900;
  letter-spacing:.4px;
}

.brand span{
  display:block;
  margin-top:4px;
  font-size:12px;
  color:var(--muted);
  letter-spacing:.3px;
}

.cover-link{
  display:block;
  position:relative;
  z-index:1;
  border-radius:24px;
  overflow:hidden;
  text-decoration:none;
  margin-bottom:16px;
}

.cover{
  width:100%;
  display:block;
  border-radius:24px;
  border:1px solid rgba(255,255,255,.12);
  box-shadow:0 18px 40px rgba(0,0,0,.40);
  transition:transform .35s ease, box-shadow .35s ease, filter .35s ease;
}

.cover-link::after{
  content:"Tap Cover To Open Spotify";
  position:absolute;
  left:50%;
  bottom:14px;
  transform:translateX(-50%);
  padding:8px 12px;
  border-radius:999px;
  background:rgba(5,10,20,.55);
  border:1px solid rgba(255,255,255,.12);
  color:#fff;
  font-size:10px;
  font-weight:800;
  letter-spacing:1.4px;
  opacity:0;
  transition:opacity .25s ease, transform .25s ease;
  backdrop-filter:blur(10px);
  -webkit-backdrop-filter:blur(10px);
  white-space:nowrap;
}

.cover-link:hover .cover{
  transform:scale(1.015);
  filter:brightness(1.03);
  box-shadow:0 22px 46px rgba(0,0,0,.46), 0 0 36px rgba(98,230,255,.08);
}

.cover-link:hover::after{
  opacity:1;
  transform:translateX(-50%) translateY(-2px);
}

.status{
  position:relative;
  z-index:1;
  display:inline-flex;
  align-items:center;
  justify-content:center;
  gap:6px;
  margin:2px auto 14px;
  padding:10px 18px;
  border-radius:999px;
  font-size:12px;
  font-weight:900;
  letter-spacing:.4px;
  color:#fff;
  background:linear-gradient(90deg, var(--violet), var(--pink));
  box-shadow:0 10px 24px rgba(0,0,0,.28), 0 0 26px rgba(123,125,255,.16);
}

.title-wrap{
  position:relative;
  z-index:1;
  margin-bottom:12px;
}

h1{
  font-size:22px;
  font-weight:950;
  line-height:1.08;
  letter-spacing:1.8px;
  text-transform:uppercase;
}

.artist{
  margin-top:8px;
  font-size:14px;
  font-weight:800;
  color:var(--muted);
  letter-spacing:.3px;
}

.tap-note{
  position:relative;
  z-index:1;
  margin:12px 0 14px;
  font-size:11px;
  font-weight:900;
  letter-spacing:3px;
  color:rgba(255,255,255,.78);
}

.spotify-zone{
  position:relative;
  z-index:1;
  margin-bottom:14px;
}

.spotify-zone::before{
  content:"";
  position:absolute;
  inset:-10px;
  border-radius:28px;
  background:radial-gradient(circle at 50% 50%, rgba(98,230,255,.12), transparent 70%);
  filter:blur(14px);
  pointer-events:none;
}

.desc{
  position:relative;
  z-index:1;
  font-size:15px;
  line-height:1.5;
  font-weight:700;
  color:#eef3ff;
  margin:14px 6px 16px;
}

.section{
  position:relative;
  z-index:1;
  margin:4px 0 12px;
  font-size:11px;
  font-weight:900;
  letter-spacing:2.4px;
  color:var(--muted-2);
}

.platforms{
  position:relative;
  z-index:1;
  display:flex;
  flex-direction:column;
  gap:12px;
}

.btn{
  position:relative;
  text-decoration:none;
  min-height:60px;
  padding:17px 16px;
  border-radius:22px;
  border:1px solid var(--line);
  background:
    linear-gradient(135deg, rgba(255,255,255,.05), rgba(255,255,255,.02)),
    rgba(255,255,255,.03);
  color:#fff;
  font-size:15px;
  font-weight:900;
  letter-spacing:.4px;
  display:flex;
  align-items:center;
  justify-content:center;
  gap:10px;
  transition:transform .22s ease, box-shadow .22s ease, border-color .22s ease, background .22s ease;
  overflow:hidden;
}

.btn::before{
  content:"";
  position:absolute;
  inset:0;
  background:linear-gradient(115deg, transparent 20%, rgba(255,255,255,.08) 50%, transparent 80%);
  transform:translateX(-120%);
  transition:transform .5s ease;
}

.btn:hover{
  transform:translateY(-2px);
  border-color:rgba(255,255,255,.18);
  box-shadow:0 12px 30px rgba(0,0,0,.22);
}

.btn:hover::before{
  transform:translateX(120%);
}

.btn:active{
  transform:scale(.985);
}

.btn.primary{
  color:#06111d;
  background:linear-gradient(90deg, var(--blue), var(--violet));
  box-shadow:var(--blueGlow);
  border-color:rgba(255,255,255,.18);
  font-size:16px;
}

.btn.primary:hover{
  box-shadow:0 14px 36px rgba(98,230,255,.24), 0 10px 28px rgba(123,125,255,.22);
}

.icon{
  display:flex;
  align-items:center;
  justify-content:center;
}

.icon img{
  width:18px;
  height:18px;
  display:block;
}

.footer{
  position:relative;
  z-index:1;
  margin-top:18px;
  font-size:12px;
  color:var(--muted-2);
  letter-spacing:.2px;
}

@keyframes floatAura{
  0%,100%{ transform:translate3d(0,0,0) scale(1); }
  50%{ transform:translate3d(0,-10px,0) scale(1.02); }
}

@media (max-width:420px){
  .wrap{
    padding:16px;
    border-radius:30px;
  }

  h1{
    font-size:20px;
    letter-spacing:1.4px;
  }

  .desc{
    font-size:14px;
  }

  .btn{
    min-height:58px;
    font-size:14px;
  }

  .btn.primary{
    font-size:15px;
  }

  .tap-note{
    letter-spacing:2.4px;
  }
}
</style>
</head>
<body>

</body>
</html>
