<!doctype html>
<html lang="en">
<head>

<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>If Earth Could Talk | Omo Taker</title>

<meta name="theme-color" content="#05070d">

<style>

:root{
--bg:#05070d;
--card:rgba(255,255,255,.05);
--text:#ffffff;
--muted:rgba(255,255,255,.65);
--border:rgba(255,255,255,.18);
--radius:28px;
}

*{
box-sizing:border-box;
margin:0;
padding:0;
font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;
}

body{
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
padding:26px 16px;

background:
radial-gradient(circle at 20% 20%, #6a7bff40, transparent 40%),
radial-gradient(circle at 80% 80%, #ff5bc240, transparent 40%),
radial-gradient(circle at 70% 10%, #55e6ff30, transparent 40%),
linear-gradient(180deg,#03040a,#0b1020 45%,#05070d);
}

/* CARD */

.wrap{
width:100%;
max-width:420px;

border-radius:32px;
padding:20px;

background:var(--card);
backdrop-filter:blur(18px);

border:1px solid var(--border);

box-shadow:
0 24px 70px rgba(0,0,0,.55);

text-align:center;
}

/* BRAND */

.brand{
margin-bottom:16px;
}

.brand b{
display:block;
font-size:16px;
letter-spacing:.4px;
font-weight:900;
}

.brand span{
font-size:12px;
color:var(--muted);
}

/* COVER */

.cover{
width:100%;
border-radius:22px;
margin-bottom:14px;
border:1px solid var(--border);
box-shadow:0 12px 34px rgba(0,0,0,.35);
}

/* BADGE */

.status{
display:inline-block;
margin:10px auto 14px auto;
padding:8px 16px;
border-radius:999px;
font-size:12px;
font-weight:800;

background:linear-gradient(90deg,#6a7bff,#ff5bc2);
color:#fff;

box-shadow:
0 8px 20px rgba(0,0,0,.35);
}

/* TITLE */

h1{
font-size:22px;
font-weight:900;
letter-spacing:1px;
}

.artist{
font-size:13px;
color:var(--muted);
margin-top:4px;
}

/* DESCRIPTION */

.desc{
font-size:15px;
color:#e8e8e8;
margin:12px 0 18px 0;
line-height:1.6;
font-weight:600;
}

/* SECTION */

.section{
margin:14px 0 10px;
font-size:11px;
letter-spacing:1.4px;
font-weight:800;
color:var(--muted);
}

/* BUTTON STACK */

.platforms{
display:flex;
flex-direction:column;
gap:12px;
}

/* BUTTON */

.btn{
text-decoration:none;
padding:15px;

border-radius:20px;

border:1px solid var(--border);

background:rgba(255,255,255,.05);

color:#fff;

font-weight:900;
font-size:14px;

display:flex;
align-items:center;
justify-content:center;

gap:10px;

transition:.2s ease;
}

/* PRIMARY BUTTON */

.btn.primary{
background:linear-gradient(90deg,#55e6ff,#6a7bff);
color:#071018;
}

/* HOVER */

.btn:hover{
transform:translateY(-2px);
}

.btn:active{
transform:scale(.97);
}

/* ICON */

.icon img{
width:18px;
height:18px;
}

/* FOOTER */

.footer{
margin-top:18px;
font-size:12px;
color:var(--muted);
}

</style>
</head>

<body>

<div class="wrap">

<div class="brand">
<b>OMK Records</b>
<span>Official links</span>
</div>

<img
src="https://raw.githubusercontent.com/omk-store/omk-website/main/27475981-5AEA-4007-BC96-AA39B96FCC87.png"

<div class="status">
Out Now 🌍
</div>

<h1>IF EARTH COULD TALK</h1>

<div class="artist">
Omo Taker • OMK Records
</div>

<div class="desc">

</div>

<div class="section">
LISTEN NOW
</div>

<div class="platforms">

href="https://open.spotify.com/track/7mifEtIK9OPGWD9EyOOLnq?si=0sQivtDWRvm6Oytb57phdg"
target="_blank">

<span class="icon">
<img src="https://cdn.simpleicons.org/spotify/071018">
</span>

</div>

<div class="footer">
© 2026 Omo Taker • OMK Records
</div>

</div>

</body>
</html>
