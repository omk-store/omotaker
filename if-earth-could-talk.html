<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>If Earth Could Talk | Omo Taker</title>
<meta name="theme-color" content="#05070d">

<style>
:root{
  --bg:#05070d;
  --card:rgba(255,255,255,.05);
  --text:#ffffff;
  --muted:rgba(255,255,255,.68);
  --border:rgba(255,255,255,.16);
  --radius:28px;
}

*{
  box-sizing:border-box;
  margin:0;
  padding:0;
  font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;
  -webkit-tap-highlight-color:transparent;
}

body{
  min-height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  padding:24px 16px;
  background:
    radial-gradient(circle at 20% 20%, #6a7bff40, transparent 40%),
    radial-gradient(circle at 80% 80%, #ff5bc240, transparent 40%),
    radial-gradient(circle at 70% 10%, #55e6ff30, transparent 40%),
    linear-gradient(180deg,#03040a,#0b1020 45%,#05070d);
  color:var(--text);
}

.wrap{
  width:100%;
  max-width:420px;
  border-radius:32px;
  padding:18px;
  background:var(--card);
  backdrop-filter:blur(18px);
  -webkit-backdrop-filter:blur(18px);
  border:1px solid var(--border);
  box-shadow:0 24px 70px rgba(0,0,0,.55);
  text-align:center;
}

.brand{
  margin-bottom:14px;
}

.brand b{
  display:block;
  font-size:16px;
  letter-spacing:.4px;
  font-weight:900;
}

.brand span{
  font-size:12px;
  color:var(--muted);
}

.cover{
  width:100%;
  display:block;
  border-radius:22px;
  border:1px solid var(--border);
  box-shadow:0 12px 34px rgba(0,0,0,.35);
  margin-bottom:14px;
}

.status{
  display:inline-block;
  margin:4px auto 12px;
  padding:8px 16px;
  border-radius:999px;
  font-size:12px;
  font-weight:900;
  background:linear-gradient(90deg,#6a7bff,#ff5bc2);
  color:#fff;
  box-shadow:0 10px 24px rgba(0,0,0,.28);
}

h1{
  font-size:21px;
  font-weight:900;
  letter-spacing:1px;
  line-height:1.1;
  margin-bottom:6px;
}

.artist{
  font-size:13px;
  color:var(--muted);
  margin-bottom:14px;
}

.top-cta{
  margin:0 0 14px 0;
}

.tap-note{
  font-size:11px;
  letter-spacing:1.8px;
  font-weight:900;
  color:rgba(255,255,255,.78);
  margin-bottom:10px;
}

.desc{
  font-size:15px;
  color:#f0f2ff;
  margin:14px 0 16px;
  line-height:1.5;
  font-weight:700;
}

.section{
  margin:6px 0 10px;
  font-size:11px;
  letter-spacing:1.6px;
  font-weight:900;
  color:var(--muted);
}

.platforms{
  display:flex;
  flex-direction:column;
  gap:12px;
}

.btn{
  text-decoration:none;
  padding:16px 15px;
  border-radius:20px;
  border:1px solid var(--border);
  background:rgba(255,255,255,.05);
  color:#fff;
  font-weight:900;
  font-size:14px;
  display:flex;
  align-items:center;
  justify-content:center;
  gap:10px;
  transition:transform .2s ease, box-shadow .2s ease, border-color .2s ease;
  min-height:56px;
}

.btn.primary{
  background:linear-gradient(90deg,#55e6ff,#6a7bff);
  color:#071018;
  box-shadow:0 14px 32px rgba(94,137,255,.28);
  font-size:15px;
}

.btn:hover{
  transform:translateY(-2px);
}

.btn:active{
  transform:scale(.98);
}

.icon{
  display:flex;
  align-items:center;
  justify-content:center;
}

.icon img{
  width:18px;
  height:18px;
}

.footer{
  margin-top:18px;
  font-size:12px;
  color:var(--muted);
}

@media (max-width:420px){
  .wrap{
    padding:16px;
    border-radius:28px;
  }

  h1{
    font-size:20px;
  }

  .desc{
    font-size:14px;
  }

  .btn{
    font-size:14px;
  }
}
</style>
</head>
<body>

<div class="wrap">

  <div class="brand">
    <b>OMK Records</b>
    <span>Official links</span>
  </div>

  <img
    src="https://raw.githubusercontent.com/omk-store/omk-website/main/27475981-5AEA-4007-BC96-AA39B96FCC87.png"
    class="cover"
    alt="If Earth Could Talk Cover">

  <div class="status">Out Now 🌍</div>

  <h1>IF EARTH COULD TALK</h1>

  <div class="artist">Omo Taker • OMK Records</div>

  <div class="top-cta">
    <div class="tap-note">TAP BELOW TO PLAY</div>

    <a class="btn primary"
      href="https://open.spotify.com/track/7mifEtIK9OPGWD9EyOOLnq?si=0sQivtDWRvm6Oytb57phdg"
      target="_blank" rel="noopener">
      <span class="icon">
        <img src="https://cdn.simpleicons.org/spotify/071018" alt="Spotify">
      </span>
      PLAY ON SPOTIFY
    </a>
  </div>

  <div class="desc">
    The Earth is speaking 🌍 Listen now.
  </div>

  <div class="section">MORE PLATFORMS</div>

  <div class="platforms">
    <a class="btn"
      href="https://music.apple.com/ng/album/if-earth-could-talk/1881338853?i=1881338854"
      target="_blank" rel="noopener">
      <span class="icon">
        <img src="https://cdn.simpleicons.org/applemusic/ffffff" alt="Apple Music">
      </span>
      APPLE MUSIC
    </a>

    <a class="btn"
      href="https://www.boomplay.com/share/music/240458081"
      target="_blank" rel="noopener">
      BOOMPLAY
    </a>

    <a class="btn"
      href="https://audiomack.com/iam_omotaker/song/if-earth-could-talk"
      target="_blank" rel="noopener">
      AUDIOMACK
    </a>
  </div>

  <div class="footer">© 2026 Omo Taker • OMK Records</div>

</div>

</body>
</html>
