<!doctype html>
<html lang="en">
<head>

<title>Benin To Lagos | Omo Taker</title>

<style>
:root{
  --text:#ffffff;
  --muted:rgba(233,240,255,.72);
  --muted2:rgba(233,240,255,.52);
}

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:Inter,system-ui;
}

body{
  min-height:100vh;
  background:

  justify-content:center;
  align-items:center;
  padding:20px;
  color:white;
}

.wrap{
  width:100%;
  max-width:420px;
  background:linear-gradient(180deg, rgba(8,14,28,.95), rgba(5,10,20,.98));
  border-radius:30px;
  padding:22px;
  backdrop-filter:blur(20px);
  border:1px solid rgba(255,255,255,.10);
  box-shadow:0 30px 80px rgba(0,0,0,.6);
  text-align:center;
}

.brand{
  margin-bottom:18px;
}

.brand b{
  font-size:16px;
}

.brand span{
  font-size:12px;
  color:var(--muted);
  display:block;
}

.cover{
  width:100%;
  border-radius:20px;
  margin-bottom:18px;
}

h1{
  font-size:24px;
  font-weight:900;
  letter-spacing:1px;
}

.artist{
  color:var(--muted);
  margin-top:6px;
  font-size:14px;
}

.tagline{
  margin-top:8px;
  font-size:13px;
  color:var(--muted2);
}

.section{
  margin-top:26px;
  font-size:11px;
  color:var(--muted2);
  letter-spacing:3px;
  font-weight:800;
  text-transform:uppercase;
}

.platforms{
  display:flex;
  flex-direction:column;
  gap:14px;
  margin-top:16px;
}

.btn{
  text-decoration:none;
  padding:18px;
  border-radius:20px;
  display:flex;
  align-items:center;
  justify-content:center;
  border:1px solid rgba(255,255,255,.10);
  font-weight:700;
}

.spotify{
  background:linear-gradient(90deg,#62e6ff,#7b7dff,#ff63c6);
  color:#06111d;
  font-weight:900;
}

.darkbtn{
  background:rgba(255,255,255,.05);
  color:white;
}

/* FAN FAVORITES CLEAN */
.fan-list{
  display:flex;
  flex-direction:column;
  gap:14px;
  margin-top:16px;
}

.fan-card{
  background:rgba(255,255,255,.05);
  border-radius:20px;
  padding:18px;
}

.fan-title{
  font-weight:900;
  font-size:16px;
}

.fan-meta{
  font-size:13px;
  color:var(--muted2);
  margin-top:4px;
}

.footer{
  margin-top:22px;
  font-size:12px;
  color:var(--muted2);
}

    </div>

    <div class="fan-card">
      <div class="fan-title">Benin To Lagos</div>
