<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>If Earth Could Talk | Omo Taker</title>
<meta name="description" content="Stream If Earth Could Talk by Omo Taker on Spotify, Apple Music, Boomplay and Audiomack.">
<meta name="theme-color" content="#070913">

<style>
:root{
  --bg:#05070d;
  --bg2:#0a0d18;
  --card:rgba(255,255,255,.06);
  --text:#ffffff;
  --muted:rgba(255,255,255,.68);
  --soft:rgba(255,255,255,.50);
  --border:rgba(255,255,255,.14);
  --border-strong:rgba(255,255,255,.22);
  --shadow:0 18px 60px rgba(0,0,0,.45);
  --radius:30px;
  --glow1:#6a7bff;
  --glow2:#ff5bc2;
  --glow3:#33ffd5;
}

*{
  box-sizing:border-box;
  margin:0;
  padding:0;
  font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;
  -webkit-tap-highlight-color:transparent;
}

html{
  scroll-behavior:smooth;
}

body{
  min-height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  padding:28px 16px;
  color:var(--text);
  background:
    radial-gradient(circle at 15% 20%, rgba(106,123,255,.20), transparent 34%),
    radial-gradient(circle at 85% 80%, rgba(255,91,194,.18), transparent 30%),
    radial-gradient(circle at 50% 100%, rgba(51,255,213,.08), transparent 28%),
    linear-gradient(180deg, var(--bg), var(--bg2));
}

.page-glow{
  position:fixed;
  inset:0;
  pointer-events:none;
  background:
    radial-gradient(circle at 50% 0%, rgba(106,123,255,.10), transparent 35%),
    radial-gradient(circle at 0% 100%, rgba(255,91,194,.08), transparent 35%);
  filter:blur(10px);
}

.wrap{
  width:100%;
  max-width:430px;
  position:relative;
  border-radius:30px;
  padding:20px;
  background:linear-gradient(180deg, rgba(255,255,255,.07), rgba(255,255,255,.04));
  backdrop-filter:blur(18px);
  -webkit-backdrop-filter:blur(18px);
  border:1px solid var(--border);
  box-shadow:var(--shadow);
  text-align:center;
  overflow:hidden;
}

.wrap::before{
  content:"";
  position:absolute;
  inset:0;
  border-radius:inherit;
  padding:1px;
  background:linear-gradient(135deg, rgba(106,123,255,.35), rgba(255,91,194,.25), rgba(51,255,213,.22));
  -webkit-mask:
    linear-gradient(#fff 0 0) content-box,
    linear-gradient(#fff 0 0);
  -webkit-mask-composite:xor;
          mask-composite:exclude;
  pointer-events:none;
}

.brand{
  margin-bottom:16px;
  position:relative;
  z-index:1;
}

.brand b{
  display:block;
  font-size:16px;
  letter-spacing:.3px;
  font-weight:800;
}

.brand span{
  display:block;
  margin-top:4px;
  font-size:12px;
  color:var(--muted);
}

.hero{
  position:relative;
  z-index:1;
  margin-bottom:12px;
}

.cover-shell{
  position:relative;
  padding:10px;
  border-radius:26px;
  background:linear-gradient(135deg, rgba(106,123,255,.12), rgba(255,91,194,.10), rgba(51,255,213,.08));
  border:1px solid var(--border);
  box-shadow:0 10px 30px rgba(0,0,0,.25);
}

.cover{
  display:block;
  width:100%;
  border-radius:20px;
  border:1px solid rgba(255,255,255,.10);
}

.status{
  display:inline-flex;
  align-items:center;
  justify-content:center;
  gap:8px;
  margin:16px auto 0;
  padding:9px 18px;
  border-radius:999px;
  font-size:13px;
  font-weight:800;
  background:linear-gradient(90deg, #6a7bff, #ff5bc2);
  color:#fff;
  box-shadow:0 10px 25px rgba(106,123,255,.18);
}

h1{
  margin-top:18px;
  font-size:28px;
  line-height:1.05;
  font-weight:950;
  letter-spacing:.8px;
}

.artist{
  margin-top:8px;
  font-size:14px;
  color:var(--muted);
}

.pitch{
  margin:16px auto 0;
  max-width:330px;
  font-size:15px;
  line-height:1.6;
  color:#f4f5ff;
  font-weight:650;
}

.subpitch{
  margin-top:10px;
  font-size:14px;
  color:var(--soft);
}

.section{
  margin:22px 0 12px;
  font-size:12px;
  letter-spacing:2px;
  font-weight:900;
  color:var(--muted);
}

.platforms{
  display:flex;
  flex-direction:column;
  gap:12px;
}

.btn{
  text-decoration:none;
  padding:16px 18px;
  border-radius:18px;
  border:1px solid var(--border);
  background:linear-gradient(180deg, rgba(255,255,255,.06), rgba(255,255,255,.04));
  color:#fff;
  font-weight:850;
  font-size:15px;
  display:flex;
  align-items:center;
  justify-content:center;
  gap:10px;
  transition:transform .18s ease, border-color .18s ease, background .18s ease, box-shadow .18s ease;
  min-height:56px;
}

.btn:hover{
  border-color:var(--border-strong);
  background:linear-gradient(180deg, rgba(255,255,255,.09), rgba(255,255,255,.05));
  box-shadow:0 10px 24px rgba(0,0,0,.18);
}

.btn:active{
  transform:scale(.98);
}

.btn.primary{
  background:linear-gradient(90deg, rgba(106,123,255,.18), rgba(255,91,194,.16));
  border-color:rgba(255,255,255,.18);
}

.icon{
  display:inline-flex;
  align-items:center;
  justify-content:center;
}

.icon img{
  width:18px;
  height:18px;
  display:block;
}

.footer{
  margin-top:18px;
  font-size:12px;
  color:var(--muted);
}

@media (max-width:430px){
  .wrap{
    padding:18px 16px;
    border-radius:26px;
  }

  h1{
    font-size:24px;
  }

  .pitch{
    font-size:14px;
  }

  .btn{
    font-size:14px;
  }
}
</style>
</head>

<body>
<div class="page-glow"></div>

<div class="wrap">

  <div class="brand">
    <b>OMK Records</b>
    <span>Official links</span>
  </div>

  <div class="hero">
    <div class="cover-shell">
      <img
        src="https://raw.githubusercontent.com/omk-store/omk-website/main/27475981-5AEA-4007-BC96-AA39B96FCC87.png"
        class="cover"
        alt="If Earth Could Talk Cover">
    </div>

    <div class="status">Out Now 🌍</div>

    <h1>IF EARTH COULD TALK</h1>
    <div class="artist">Omo Taker • OMK Records</div>

    <div class="pitch">
      If the world had a voice, this sound would carry the pain, the fire, the prayer and the truth.
    </div>
    <div class="subpitch">Press play and feel the message.</div>
  </div>

  <div class="section">LISTEN NOW</div>
  <div class="platforms">

    <a class="btn primary" href="https://open.spotify.com/track/7mifEtIK9OPGWD9EyOOLnq?si=0sQivtDWRvm6Oytb57phdg" target="_blank" rel="noopener">
      <span class="icon">
        <img src="https://cdn.simpleicons.org/spotify/ffffff" alt="Spotify icon">
      </span>
      PLAY ON SPOTIFY
    </a>

    <a class="btn" href="https://music.apple.com/ng/album/if-earth-could-talk/1881338853?i=1881338854" target="_blank" rel="noopener">
      <span class="icon">
        <img src="https://cdn.simpleicons.org/applemusic/ffffff" alt="Apple Music icon">
      </span>
      APPLE MUSIC
    </a>

    <a class="btn" href="https://www.boomplay.com/share/music/240458081" target="_blank" rel="noopener">
      BOOMPLAY
    </a>

    <a class="btn" href="https://audiomack.com/iam_omotaker/song/if-earth-could-talk" target="_blank" rel="noopener">
      AUDIOMACK
    </a>

  </div>

  <div class="footer">
    © 2026 Omo Taker • OMK Records
  </div>

</div>
</body>
</html>
