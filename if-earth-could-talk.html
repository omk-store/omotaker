<style>
:root{
  --bg:#05070d;
  --card:rgba(255,255,255,.05);
  --text:#ffffff;
  --muted:rgba(255,255,255,.68);
  --border:rgba(255,255,255,.16);
}

*{
  box-sizing:border-box;
  margin:0;
  padding:0;
  font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;
}

body{
  min-height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  padding:24px 16px;
  color:var(--text);
  background:
    radial-gradient(circle at 20% 20%, #6a7bff40, transparent 40%),
    radial-gradient(circle at 80% 80%, #ff5bc240, transparent 40%),
    radial-gradient(circle at 70% 10%, #55e6ff30, transparent 40%),
    linear-gradient(180deg,#03040a,#0b1020 45%,#05070d);
}

.wrap{
  width:100%;
  max-width:420px;
  border-radius:32px;
  padding:18px;
  background:var(--card);
  backdrop-filter:blur(18px);
  border:1px solid var(--border);
  box-shadow:0 24px 70px rgba(0,0,0,.55);
  text-align:center;
}

.brand{
  margin-bottom:14px;
}

.brand b{
  display:block;
  font-size:16px;
  letter-spacing:.4px;
  font-weight:900;
}

.brand span{
  font-size:12px;
  color:var(--muted);
}

.cover{
  width:100%;
  display:block;
  border-radius:22px;
  border:1px solid var(--border);
  box-shadow:0 12px 34px rgba(0,0,0,.35);
  margin-bottom:14px;
}

.status{
  display:inline-block;
  margin:4px auto 12px;
  padding:8px 16px;
  border-radius:999px;
  font-size:12px;
  font-weight:900;
  background:linear-gradient(90deg,#6a7bff,#ff5bc2);
  color:#fff;
}

h1{
  font-size:21px;
  font-weight:900;
  letter-spacing:1px;
  margin-bottom:6px;
}

.artist{
  font-size:13px;
  color:var(--muted);
  margin-bottom:14px;
  font-weight:700;
}

.tap-note{
  font-size:11px;
  letter-spacing:1.8px;
  font-weight:900;
  margin-bottom:10px;
  color:rgba(255,255,255,.78);
}

.platforms{
  display:flex;
  flex-direction:column;
  gap:12px;
}

.btn{
  text-decoration:none;
  padding:16px 15px;
  border-radius:20px;
  border:1px solid var(--border);
  background:rgba(255,255,255,.05);
  color:#fff;
  font-weight:900;
  font-size:14px;
  display:flex;
  align-items:center;
  justify-content:center;
  gap:10px;
}

.btn.primary{
  background:linear-gradient(90deg,#55e6ff,#6a7bff);
  color:#071018;
}

.footer{
  margin-top:18px;
  font-size:12px;
  color:var(--muted);
}
</style>
</head>
