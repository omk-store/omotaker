<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Get Featured | Everyday Vibe</title>

<style>
body{
  margin:0;
  font-family:'Segoe UI', sans-serif;
  background:
    radial-gradient(circle at 20% 20%, rgba(0,255,200,0.15), transparent 30%),
    radial-gradient(circle at 80% 80%, rgba(0,150,255,0.15), transparent 30%),
    #020617;
  color:white;
  text-align:center;
}

.container{
  max-width:420px;
  margin:auto;
  padding:30px 20px;
}

/* HEADER */
h1{
  font-size:28px;
  margin-bottom:8px;
}

.sub{
  opacity:0.7;
  font-size:14px;
  margin-bottom:25px;
}

/* PLAN */
.plan{
  display:flex;
  align-items:center;
  gap:12px;
  background:rgba(255,255,255,0.05);
  padding:14px;
  border-radius:14px;
  margin:10px 0;
  text-align:left;
  border:1px solid transparent;
  transition:0.3s ease;
  cursor:pointer;
}

.plan input{
  transform:scale(1.3);
}

/* SELECTED GLOW */
.plan:has(input:checked){
  border:1px solid #00ff9f;
  box-shadow:0 0 20px rgba(0,255,159,0.2);
  background:rgba(0,255,159,0.05);
}

/* INPUT */
input[type="text"],
input[type="url"]{
  width:100%;
  padding:15px;
  margin:12px 0;
  border-radius:12px;
  border:none;
  background:rgba(255,255,255,0.08);
  color:white;
  outline:none;
  transition:0.2s;
}

/* INPUT FOCUS */
input:focus{
  box-shadow:0 0 0 1px #00ff9f;
  background:rgba(255,255,255,0.12);
}

/* BUTTON */
button{
  width:100%;
  padding:16px;
  border:none;
  border-radius:14px;
  background:linear-gradient(90deg,#00ff9f,#00d4ff);
  color:black;
  font-weight:bold;
  font-size:16px;
  margin-top:15px;
  box-shadow:0 10px 30px rgba(0,255,200,0.3);
  transition:0.2s;
}

/* BUTTON PRESS EFFECT */
button:active{
  transform:scale(0.98);
}

/* FOOTER */
.footer{
  margin-top:25px;
  font-size:12px;
  opacity:0.4;
}
</style>

</head>

<body>

<div class="container">

<h1>Get Featured on Everyday Vibe 🏆</h1>
<p class="sub">If your sound is different… we push it to the right audience 🔥</p>

<form action="https://formsubmit.co/activevibe65@gmail.com" method="POST">

<!-- PLAN -->
<label class="plan">
<input type="radio" name="Selected Plan" value="Starter Promo - ₦30,000" required>
⚡ Starter Promo — ₦30,000
</label>

<label class="plan">
<input type="radio" name="Selected Plan" value="7-Day Push - ₦80,000">
🚀 7-Day Push — ₦80,000
</label>

<label class="plan">
<input type="radio" name="Selected Plan" value="Premium Campaign - ₦120,000">
🏆 Premium Campaign — ₦120,000
</label>

<input type="text" name="Artist Name" placeholder="Artist Name" required>
<input type="text" name="Location" placeholder="Where are you based?" required>
<input type="url" name="Song Link" placeholder="Song Link" required>

<input type="hidden" name="_subject" value="New Artist Submission (With Plan)">
<input type="hidden" name="_captcha" value="false">

<!-- REDIRECT -->
<input type="hidden" name="_next" value="https://www.omotaker.com/">

<button type="submit">Submit for Review 🚀</button>

</form>

<div class="footer">
Powered by Everyday Vibe 🏆 | Viral Music Discovery
</div>

</div>

</body>
</html>
