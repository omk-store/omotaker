body{
  margin:0;
  font-family:'Segoe UI', sans-serif;
  background:

}

}

.section-title{

}

.plan{

}

.plan input{
  margin-right:12px;
  transform:scale(1.3);
}

.plan-text{
  font-size:15px;
}

/* INPUT */
.input-box{
  margin-top:10px;
}

  border:none;
  background:rgba(255,255,255,0.08);
  color:white;
}
