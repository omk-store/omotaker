<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Get Featured | Everyday Vibe</title>

<style>
body{
  margin:0;
  font-family: 'Segoe UI', sans-serif;
  background:
    radial-gradient(circle at 20% 20%, rgba(0,255,200,0.15), transparent 30%),
    radial-gradient(circle at 80% 80%, rgba(0,150,255,0.15), transparent 30%),
    #020617;
  color:white;
  text-align:center;
}

.container{
  max-width:420px;
  margin:auto;
  padding:25px 20px;
}

/* TITLE */
h1{
  font-size:28px;
  margin-top:20px;
  line-height:1.3;
}

/* SUBTEXT */
.sub{
  opacity:0.7;
  font-size:14px;
  margin-bottom:20px;
}

/* CARD */
.card{
  background:rgba(255,255,255,0.05);
  border:1px solid rgba(255,255,255,0.08);
  padding:15px;
  border-radius:15px;
  margin-bottom:15px;
  font-size:13px;
  opacity:0.85;
}

/* INPUT */
input{
  width:100%;
  padding:15px;
  margin:10px 0;
  border-radius:12px;
  border:none;
  outline:none;
  background:rgba(255,255,255,0.08);
  color:white;
}

/* BUTTON */
button{
  width:100%;
  padding:16px;
  margin-top:10px;
  border:none;
  border-radius:12px;
  background:linear-gradient(90deg,#00ff9f,#00d4ff);
  color:black;
  font-weight:bold;
  font-size:16px;
  box-shadow:0 10px 30px rgba(0,255,200,0.3);
  cursor:pointer;
}

/* SMALL TEXT */
.note{
  margin-top:12px;
  font-size:12px;
  opacity:0.6;
}

.footer{
  margin-top:25px;
  font-size:12px;
  opacity:0.4;
}
</style>

</head>

<body>

<div class="container">

<h1>Get Featured on Everyday Vibe 🏆</h1>

<p class="sub">
If your sound is different… we push it to the right audience 🔥
</p>

<div class="card">
🎧 Playlist Placement • 📈 Music Promotion • 🚀 Artist Growth
</div>

<form action="https://formsubmit.co/activevibe65@gmail.com" method="POST">

<input type="text" name="Artist Name" placeholder="Artist Name" required>

<input type="text" name="Location" placeholder="Where are you based?" required>

<input type="url" name="Song Link" placeholder="Song Link (Spotify / Apple / Audiomack)" required>

<input type="hidden" name="_subject" value="New Artist Submission">
<input type="hidden" name="_captcha" value="false">

<button type="submit">Submit for Review 🚀</button>

</form>

<p class="note">
Selected artists will receive campaign details & payment info via email.
</p>

<div class="footer">
Powered by Everyday Vibe 🏆 | Viral Music Discovery
</div>

</div>

</body>
</html>
