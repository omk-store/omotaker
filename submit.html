<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Get Featured | Everyday Vibe</title>

<style>
body{
  margin:0;
  font-family:sans-serif;
  background:#020617;
  color:white;
  text-align:center;
}

.container{
  max-width:400px;
  margin:auto;
  padding:20px;
}

h1{
  margin-top:30px;
}

p{
  opacity:0.7;
  font-size:14px;
}

input{
  width:100%;
  padding:15px;
  margin:10px 0;
  border-radius:10px;
  border:none;
  outline:none;
}

button{
  width:100%;
  padding:15px;
  margin-top:15px;
  border:none;
  border-radius:10px;
  background:#00ff9f;
  font-weight:bold;
  font-size:16px;
  cursor:pointer;
}

.footer{
  margin-top:20px;
  font-size:12px;
  opacity:0.5;
}
</style>
</head>

<body>

<div class="container">

<h1>Get Featured on Everyday Vibe 🏆</h1>

<p>If your sound is hard… we push it 🔥</p>

<form action="https://formsubmit.co/activevibe65@gmail.com" method="POST">

<input type="text" name="Artist Name" placeholder="Artist Name" required>

<input type="text" name="Location" placeholder="Where are you based?" required>

<input type="url" name="Song Link" placeholder="Song Link (Spotify / Apple / Audiomack)" required>

<input type="hidden" name="_subject" value="New Song Submission">

<input type="hidden" name="_captcha" value="false">

<button type="submit">Submit Song 🚀</button>

</form>

<div class="footer">
Powered by Everyday Vibe 🏆 | Viral Music Discovery
</div>

</div>

</body>
</html>
