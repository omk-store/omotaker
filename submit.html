<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Get Featured | Everyday Vibe</title>

<style>
body{
  margin:0;
  font-family: 'Segoe UI', sans-serif;
  background:
    radial-gradient(circle at 20% 20%, rgba(0,255,200,0.15), transparent 30%),
    radial-gradient(circle at 80% 80%, rgba(0,150,255,0.15), transparent 30%),
    #020617;
  color:white;
  text-align:center;
}

.container{
  max-width:420px;
  margin:auto;
  padding:25px 20px;
}

h1{
  font-size:28px;
}

.sub{
  opacity:0.7;
  font-size:14px;
  margin-bottom:20px;
}

.plan{
  display:flex;
  align-items:center;
  gap:10px;
  background:rgba(255,255,255,0.05);
  padding:14px;
  border-radius:12px;
  margin:10px 0;
  text-align:left;
  border:1px solid transparent;
  transition:0.3s;
}

.plan input{
  transform:scale(1.2);
}

.plan:has(input:checked){
  border:1px solid #00ff9f;
  box-shadow:0 0 15px rgba(0,255,159,0.2);
}

input[type="text"],
input[type="url"]{
  width:100%;
  padding:15px;
  margin:12px 0;
  border-radius:12px;
  border:none;
  background:rgba(255,255,255,0.08);
  color:white;
  outline:none;
}

button{
  width:100%;
  padding:16px;
  border:none;
  border-radius:12px;
  background:linear-gradient(90deg,#00ff9f,#00d4ff);
  color:black;
  font-weight:bold;
  font-size:16px;
  margin-top:10px;
  cursor:pointer;
}

.footer{
  margin-top:20px;
  font-size:12px;
  opacity:0.4;
}

/* LOADER */
.loader{
  display:none;
  margin-top:15px;
  font-size:14px;
  opacity:0.7;
}
</style>

</head>

<body>

<div class="container">

<h1>Get Featured on Everyday Vibe 🏆</h1>
<p class="sub">If your sound is different… we push it to the right audience 🔥</p>

<form id="evForm">

<!-- PLAN -->
<label class="plan">
<input type="radio" name="Selected Plan" value="Starter Promo - ₦30,000" required>
⚡ Starter Promo — ₦30,000
</label>

<label class="plan">
<input type="radio" name="Selected Plan" value="7-Day Push - ₦80,000">
🚀 7-Day Push — ₦80,000
</label>

<label class="plan">
<input type="radio" name="Selected Plan" value="Premium Campaign - ₦120,000">
🏆 Premium Campaign — ₦120,000
</label>

<input type="text" name="Artist Name" placeholder="Artist Name" required>
<input type="text" name="Location" placeholder="Where are you based?" required>
<input type="url" name="Song Link" placeholder="Song Link" required>

<button type="submit">Submit for Review 🚀</button>

<div class="loader" id="loader">Submitting… 🚀</div>

</form>

<div class="footer">
Powered by Everyday Vibe 🏆 | Viral Music Discovery
</div>

</div>

<script>
document.getElementById("evForm").addEventListener("submit", function(e){
  e.preventDefault();

  const loader = document.getElementById("loader");
  loader.style.display = "block";

  let formData = new FormData(this);

  fetch("https://formsubmit.co/ajax/activevibe65@gmail.com", {
    method: "POST",
    body: formData
  })
  .then(() => {
    window.location.href = "https://www.omotaker.com/ev-ultra.html";
  })
  .catch(() => {
    loader.innerText = "Error. Try again.";
  });
});
</script>

</body>
</html>
