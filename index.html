/* 🔥 ANIMATED BACKGROUND */
body::before {
  content: "";

  background: radial-gradient(circle, rgba(255,100,0,0.2), transparent 60%);

@keyframes moveGlow {
  0% { transform: translate(-25%, -25%); }
  50% { transform: translate(25%, 25%); }
  100% { transform: translate(-25%, -25%); }
}

  max-width: 500px;

  text-decoration: none;
  color: #fff;
  font-size: 16px;
  font-weight: 500;
  background: linear-gradient(135deg, #1a1a1a, #000);
  box-shadow: 0 0 15px rgba(255,100,0,0.3);
  transition: all 0.3s ease;
  position: relative;
  overflow: hidden;
}

/* glow animation */
.btn::before {
  content: "";
  position: absolute;
  width: 120%;
  height: 120%;
  background: linear-gradient(90deg, transparent, rgba(255,120,0,0.6), transparent);
  top: 0;
  left: -100%;
  animation: glowMove 3s infinite;
}

@keyframes glowMove {
  0% { left: -100%; }

}

.btn:active {

}
