<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="theme-color" content="#000000" />
  <title>Omo Taker — Official</title>
  <meta name="description" content="Omo Taker official website — releases, music, videos, and connect." />

  <style>
    :root{
      --bg:#000;
      --panel:rgba(255,255,255,.06);
      --panel2:rgba(255,255,255,.09);
      --line:rgba(255,255,255,.10);
      --text:#f5f6ff;
      --muted:rgba(245,246,255,.70);

      --a1:#7aa6ff;
      --a2:#ff7ad9;
      --glow: 0 10px 35px rgba(122,166,255,.16), 0 8px 30px rgba(255,122,217,.10);

      --radius:18px;
      --max:980px;
      --font: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, "Apple Color Emoji","Segoe UI Emoji";
    }

    *{ box-sizing:border-box; }
    html,body{ height:100%; scroll-behavior:smooth; }
    body{
      margin:0;
      font-family:var(--font);
      color:var(--text);
      padding-top: env(safe-area-inset-top);
      background:
        radial-gradient(900px 500px at 15% 10%, rgba(122,166,255,.14), transparent 55%),
        radial-gradient(900px 500px at 85% 20%, rgba(255,122,217,.12), transparent 55%),
        radial-gradient(1200px 700px at 50% 85%, rgba(122,255,210,.05), transparent 60%),
        var(--bg);
    }
    a{ color:inherit; text-decoration:none; }

    .wrap{
      max-width:var(--max);
      margin:0 auto;
      padding:14px 14px 90px;
    }

    /* ====== MOVING TOP (Sticky + Scrollspy like Shallipopi) ====== */
    .pillbarWrap{
      position:sticky;
      top: calc(env(safe-area-inset-top) + 10px);
      z-index:50;
      margin: 10px 0 12px;
      display:flex;
      justify-content:center;
      pointer-events:none;
    }
    .pillbar{
      pointer-events:auto;
      width:min(980px, 100%);
      display:flex;
      gap:10px;
      padding:10px;
      border:1px solid rgba(255,255,255,.10);
      background:rgba(15,15,18,.55);
      border-radius:999px;
      backdrop-filter: blur(12px);
      overflow:auto;
      -webkit-overflow-scrolling:touch;
      box-shadow: 0 12px 35px rgba(0,0,0,.45);
    }
    .pillbar a{
      padding:10px 14px;
      border-radius:999px;
      font-weight:900;
      letter-spacing:.06em;
      font-size:12px;
      color:rgba(255,255,255,.80);
      white-space:nowrap;
      border:1px solid transparent;
      background:transparent;
      transition:.2s ease;
      flex:0 0 auto;
    }
    .pillbar a.active{
      background:rgba(255,255,255,.10);
      border-color:rgba(255,255,255,.12);
      box-shadow: var(--glow);
      color:#fff;
    }

    /* ====== HERO like Shallipopi (picture is the focus) ====== */
    .hero{
      border-radius:var(--radius);
      overflow:hidden;
      border:1px solid rgba(255,255,255,.10);
      background:rgba(255,255,255,.03);
      box-shadow: 0 20px 60px rgba(0,0,0,.55);
    }
    .heroMedia{
      position:relative;
      width:100%;
      height:520px;
      background:
        radial-gradient(900px 500px at 50% 20%, rgba(0,0,0,.10), rgba(0,0,0,.88)),
        url("YOUR-HERO-IMAGE.jpg") center/cover no-repeat;
    }
    .heroFade{
      position:absolute; left:0; right:0; bottom:0;
      height:48%;
      background: linear-gradient(to top, rgba(0,0,0,.92), rgba(0,0,0,.0));
    }
    .heroCenter{
      position:absolute; left:0; right:0; bottom:22px;
      display:flex; flex-direction:column; align-items:center; gap:10px;
      padding:0 14px;
      text-align:center;
    }
    .heroName{
      margin:0;
      font-size:36px;
      font-weight:950;
      letter-spacing:.06em;
      text-transform:uppercase;
    }

    /* ===== Social buttons under hero (ONLY IG + TikTok with real logos) ===== */
    .socialRow{
      display:flex;
      gap:12px;
      justify-content:center;
      flex-wrap:wrap;
      padding: 16px 14px 14px;
      background: rgba(0,0,0,.35);
      border-top: 1px solid rgba(255,255,255,.08);
    }
    .sBtn{
      display:inline-flex;
      align-items:center;
      justify-content:center;
      gap:10px;
      padding:12px 16px;
      border-radius:999px;
      border:1px solid rgba(255,255,255,.14);
      background:rgba(255,255,255,.06);
      font-weight:950;
      letter-spacing:.03em;
      min-width:170px;
      box-shadow: 0 10px 28px rgba(0,0,0,.35);
      transition:.2s ease;
    }
    .sBtn.primary{
      background: linear-gradient(90deg, rgba(122,166,255,.95), rgba(255,122,217,.95));
      color:#07070a;
      border-color: rgba(255,255,255,.18);
      box-shadow: var(--glow);
    }

    .ico{
      width:22px; height:22px;
      display:inline-flex;
      align-items:center;
      justify-content:center;
    }
    .svg-ico{
      width:22px; height:22px;
      fill: currentColor;
    }

    /* ===== NEW RELEASES under hero (2 small cards) ===== */
    .heroNewWrap{
      padding: 0 14px 16px;
      background: rgba(0,0,0,.28);
      border-top: 1px solid rgba(255,255,255,.08);
    }

    /* clean divider so nothing “cuts” headings */
    .section-divider{
      height:1px;
      width:100%;
      margin: 14px 0 10px;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,.16), transparent);
    }

    .heroNewTitle{
      margin: 0 0 10px;
      text-align:center;
      font-size:12px;
      font-weight:950;
      letter-spacing:.18em;
      text-transform:uppercase;
      color: rgba(255,255,255,.78);
    }
    .miniRow{
      display:flex;
      gap:12px;
      overflow:auto;
      padding: 2px 2px 6px;
      -webkit-overflow-scrolling:touch;
    }
    .miniRow::after{ content:""; flex:0 0 10px; }
    .miniSmall{
      flex:0 0 320px;
      border-radius:16px;
      border:1px solid rgba(255,255,255,.10);
      background: rgba(255,255,255,.05);
      box-shadow: 0 18px 55px rgba(0,0,0,.45);
      padding:12px;
      display:flex;
      flex-direction:column;
      gap:10px;
    }
    .miniTop{
      display:flex;
      gap:12px;
      align-items:center;
    }
    .miniCover{
      width:62px; height:62px;
      border-radius:14px;
      border:1px solid rgba(255,255,255,.10);
      background: rgba(255,255,255,.08) center/cover no-repeat;
      overflow:hidden;
      flex:0 0 auto;
      position:relative;
    }
    .miniCover::after{
      content:"";
      position:absolute; inset:0;
      background: radial-gradient(circle at 50% 50%, rgba(0,0,0,.10), rgba(0,0,0,.55));
    }
    .miniMeta{ min-width:0; }
    .miniMeta .t{
      margin:0;
      font-size:15px;
      font-weight:950;
      white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
    }
    .miniMeta .s{
      margin:6px 0 0;
      font-size:12px;
      color: rgba(255,255,255,.60);
      white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
    }
    .streamBtn{
      width:100%;
      padding:12px 14px;
      border-radius:999px;
      border:1px solid rgba(255,255,255,.14);
      background:rgba(255,255,255,.06);
      font-weight:950;
      text-align:center;
    }

    /* Sections */
    .section{
      margin-top:18px;
      padding-top:14px;
      border-top: none; /* removed hard border that was cutting */
      scroll-margin-top: 92px;
    }
    .section h2{
      margin:16px 0 12px;
      text-align:center;
      font-size:22px;
      font-weight:950;
      letter-spacing:.12em;
      text-transform:uppercase;
    }

    /* ====== Horizontal rail cards ====== */
    .rail{
      display:flex;
      gap:12px;
      overflow:auto;
      padding:6px 4px 10px;
      scroll-snap-type: x mandatory;
      -webkit-overflow-scrolling:touch;
    }
    .rail::after{ content:""; flex:0 0 18px; }
    .miniCard{
      flex:0 0 330px;
      scroll-snap-align:start;
      border-radius:var(--radius);
      border:1px solid rgba(255,255,255,.10);
      background:rgba(255,255,255,.05);
      backdrop-filter: blur(10px);
      padding:12px;
      box-shadow: 0 18px 55px rgba(0,0,0,.45);
      display:flex;
      flex-direction:column;
      min-height: 210px;
    }
    .rowTop{
      display:flex;
      gap:12px;
      align-items:center;
      margin-bottom:10px;
    }
    .cover{
      width:72px; height:72px;
      border-radius:14px;
      border:1px solid rgba(255,255,255,.10);
      background: rgba(255,255,255,.08) center/cover no-repeat;
      position:relative;
      overflow:hidden;
      flex:0 0 auto;
    }
    .playDot{
      position:absolute; inset:0;
      display:grid; place-items:center;
      background: radial-gradient(circle at 50% 50%, rgba(0,0,0,.15), rgba(0,0,0,.55));
    }
    .playDot span{
      width:36px; height:36px;
      border-radius:999px;
      display:grid; place-items:center;
      border:1px solid rgba(255,255,255,.22);
      background:rgba(255,255,255,.06);
      box-shadow: var(--glow);
      font-size:14px;
    }
    .meta{ min-width:0; }
    .meta .title{
      margin:0;
      font-size:16px;
      font-weight:950;
      white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
    }
    .meta .sub{
      margin:6px 0 0;
      font-size:12px;
      color:rgba(255,255,255,.60);
      white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
    }

    .playBtn{
      display:inline-flex; align-items:center; justify-content:center;
      width:100%;
      padding:12px 14px;
      border-radius:999px;
      border:1px solid rgba(255,255,255,.14);
      background:rgba(255,255,255,.06);
      font-weight:950;
      letter-spacing:.02em;
      margin-bottom:10px;
    }
    .chips{
      display:grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap:10px;
      margin-top:auto;
    }
    .chip{
      padding:10px 12px;
      border-radius:999px;
      border:1px solid rgba(255,255,255,.14);
      background:rgba(255,255,255,.06);
      font-weight:900;
      font-size:11px;
      letter-spacing:.05em;
      text-align:center;
      white-space:nowrap;
    }

    /* Videos */
    .videoCard{
      border-radius:var(--radius);
      overflow:hidden;
      border:1px solid rgba(255,255,255,.10);
      background:rgba(255,255,255,.05);
      box-shadow: 0 18px 55px rgba(0,0,0,.45);
      display:block;
    }
    .videoThumb{
      height:240px;
      background:
        linear-gradient(to bottom, rgba(0,0,0,.15), rgba(0,0,0,.75)),
        url("YOUR-VIDEO-THUMB.jpg") center/cover no-repeat;
      position:relative;
      display:flex;
      align-items:flex-end;
      padding:14px;
    }
    .videoThumb .label{
      font-weight:950;
      letter-spacing:.06em;
      font-size:13px;
      background:rgba(0,0,0,.35);
      border:1px solid rgba(255,255,255,.10);
      padding:10px 12px;
      border-radius:14px;
      backdrop-filter: blur(10px);
      text-transform:uppercase;
    }
    .videoThumb .bigPlay{
      position:absolute; inset:0;
      display:grid; place-items:center;
    }
    .videoThumb .bigPlay span{
      width:70px; height:70px;
      border-radius:999px;
      display:grid; place-items:center;
      border:1px solid rgba(255,255,255,.22);
      background:rgba(255,255,255,.06);
      box-shadow: var(--glow);
      font-size:24px;
    }

    /* Shop + Connect */
    .box{
      border-radius:var(--radius);
      border:1px solid rgba(255,255,255,.10);
      background:rgba(255,255,255,.05);
      padding:18px;
      text-align:center;
      box-shadow: 0 18px 55px rgba(0,0,0,.45);
    }
    .box h3{
      margin:0 0 6px;
      font-size:18px;
      font-weight:950;
      letter-spacing:.08em;
      text-transform:uppercase;
    }
    .box p{ margin:0 0 14px; color:rgba(255,255,255,.65); }

    /* SHOP upgraded */
    .storeCard{
      padding: 22px 18px;
      border-radius: 18px;
      border: 1px solid rgba(255,255,255,.12);
      background: rgba(10,10,12,.55);
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
      text-align:center;
      box-shadow: 0 18px 55px rgba(0,0,0,.45);
    }
    .storeCard h3{
      margin:0 0 6px;
      letter-spacing:.18em;
      font-weight:950;
      text-transform:uppercase;
      font-size:18px;
    }
    .storeCard p{
      margin:0 0 14px;
      opacity:.8;
      color: rgba(255,255,255,.70);
    }
    .storeBtn{
      display:inline-flex;
      padding: 14px 18px;
      border-radius: 999px;
      text-decoration:none;
      font-weight:950;
      color:#07070a;
      background: linear-gradient(90deg, rgba(122,166,255,.95), rgba(255,122,217,.95));
      border: 1px solid rgba(255,255,255,.12);
      box-shadow: var(--glow);
      max-width:420px;
      width:100%;
      justify-content:center;
      margin:0 auto;
    }

    /* CONNECT: email input + submit */
    .emailBox{
      display:flex;
      gap:10px;
      justify-content:center;
      align-items:center;
      flex-wrap:wrap;
      margin: 6px 0 14px;
    }
    .emailInput{
      width: min(520px, 92%);
      padding: 16px 16px;
      border-radius: 999px;
      border: 1px solid rgba(255,255,255,.14);
      background: rgba(10,10,12,.55);
      color: #fff;
      outline: none;
    }
    .emailSubmit{
      padding: 16px 18px;
      border-radius: 999px;
      border: 1px solid rgba(255,255,255,.12);
      font-weight: 950;
      background: rgba(255,255,255,.10);
      color:#fff;
    }

    /* small slim social buttons under email */
    .miniSocial{
      display:flex;
      gap:10px;
      justify-content:center;
      flex-wrap:wrap;
      margin-top: 6px;
    }
    .miniBtn{
      padding: 10px 14px;
      border-radius: 999px;
      text-decoration:none;
      font-weight:900;
      border: 1px solid rgba(255,255,255,.12);
      background: rgba(255,255,255,.06);
      color:#fff;
      opacity:.92;
      font-size:12px;
      letter-spacing:.04em;
    }

    footer{
      margin-top:22px;
      padding-top:16px;
      border-top:1px solid rgba(255,255,255,.10);
      text-align:center;
      color:rgba(255,255,255,.55);
      font-size:12px;
      letter-spacing:.04em;
    }

    @media (max-width:420px){
      .heroMedia{ height:540px; }
      .miniCard{ flex-basis:300px; }
      .miniSmall{ flex-basis:290px; }
      .chips{ grid-template-columns: repeat(2, minmax(0, 1fr)); }
      .sBtn{ min-width:160px; }
    }
  </style>
</head>

<body>
  <div class="wrap">

    <!-- ONLY THIS TOP MOVES (sticky) -->
    <div class="pillbarWrap">
      <nav class="pillbar" aria-label="Sections">
        <a class="active" href="#home">HOME</a>
        <a href="#releases">RELEASES</a>
        <a href="#music">MUSIC</a>
        <a href="#videos">VIDEOS</a>
        <a href="#connect">CONNECT</a>
        <a href="#store">SHOP OMK</a>
      </nav>
    </div>

    <!-- HERO -->
    <section id="home" class="hero">
      <div class="heroMedia">
        <div class="heroFade"></div>
        <div class="heroCenter">
          <h1 class="heroName">OMOTAKER</h1>
        </div>
      </div>

      <!-- IG + TikTok only (with real logos) -->
      <div class="socialRow">
        <a class="sBtn primary" href="https://instagram.com/YOUR_INSTAGRAM" target="_blank" rel="noopener">
          <span class="ico
