<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Benin To Lagos - Omo Taker</title>

<style>
body{
  margin:0;
  font-family:Arial, sans-serif;
  background:#020617;
  color:#fff;
  display:flex;
  justify-content:center;
}

.container{
  width:90%;
  max-width:420px;
  text-align:center;
}

/* IMAGE */
.banner img{
  width:100%;
  border-radius:20px;
  margin-top:20px;
  box-shadow:0 0 40px rgba(255,60,0,.3);
}

/* TEXT */
.title{
  font-size:26px;
  margin-top:15px;
  font-weight:bold;
}
.sub{
  opacity:.8;
  margin-bottom:20px;
}

/* BUTTON */
.btn{
  display:flex;
  align-items:center;
  justify-content:center;
  gap:12px;
  padding:20px;
  margin:14px 0;
  border-radius:25px;
  text-decoration:none;
  font-weight:bold;
  font-size:18px;
  color:#fff;
  transition:.3s;
}

/* SPOTIFY (PRIMARY) */
.spotify{
  background:linear-gradient(135deg,#1DB954,#1ed760);
  box-shadow:0 0 30px rgba(29,185,84,.6);
}

/* APPLE */
.apple{
  background:rgba(255,255,255,.08);
  border:1px solid rgba(255,255,255,.2);
}

/* HOVER */
.btn:hover{
  transform:scale(1.06);
}

/* LOGO */
.logo{
  width:28px;
}

/* FOOTER */
.footer{
  margin-top:25px;
  font-size:13px;
  opacity:.6;
}
</style>
</head>

<body>

<div class="container">

<!-- IMAGE -->
<div class="banner">
  <img src="https://raw.githubusercontent.com/omk-store/omk-website/main/914C5ED9-2BF8-4515-9320-9169F7E32FBB.png">
</div>

<!-- TEXT -->
<div class="title">Stream “Benin To Lagos” 🔥</div>
<div class="sub">Choose your platform 👇</div>

<!-- ONLY 2 BUTTONS -->

<a href="https://open.spotify.com/track/0SooNM8i9p1UiE7HTTp5C4" class="btn spotify" target="_blank">
  <img src="https://upload.wikimedia.org/wikipedia/commons/8/84/Spotify_icon.svg" class="logo">
  Play on Spotify
</a>

<a href="https://music.apple.com/ng/album/benin-to-lagos/1866424075?i=1866424076" class="btn apple" target="_blank">
  <img src="https://upload.wikimedia.org/wikipedia/commons/f/fa/Apple_logo_black.svg" class="logo" style="filter:invert(1);">
  Play on Apple Music
</a>

<!-- FOOTER -->
<div class="footer">
  OMK • Omo Taker 🐺
</div>

</div>

</body>
</html>
