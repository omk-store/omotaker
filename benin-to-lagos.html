<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Benin To Lagos | Omo Taker</title>

<style>
:root{
  --text:#ffffff;
  --muted:rgba(233,240,255,.72);
  --muted2:rgba(233,240,255,.52);
  --line:rgba(255,255,255,.12);
}

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:Inter,system-ui;
}

body{
  min-height:100vh;
  background:
    radial-gradient(circle at 20% 20%, rgba(98,230,255,.15), transparent 30%),
    radial-gradient(circle at 80% 80%, rgba(255,99,198,.12), transparent 30%),
    linear-gradient(180deg,#020309,#07111d,#04060d);
  display:flex;
  justify-content:center;
  align-items:center;
  padding:20px;
  color:white;
}

.wrap{
  width:100%;
  max-width:420px;
  background:linear-gradient(180deg, rgba(8,14,28,.95), rgba(5,10,20,.98));
  border-radius:30px;
  padding:20px;
  backdrop-filter:blur(20px);
  border:1px solid rgba(255,255,255,.10);
  box-shadow:0 30px 80px rgba(0,0,0,.6);
}

/* HEADER */
.brand{
  text-align:center;
  margin-bottom:16px;
}
.brand b{
  font-size:16px;
}
.brand span{
  font-size:12px;
  color:var(--muted);
}

/* COVER */
.cover{
  width:100%;
  border-radius:20px;
  margin-bottom:14px;
}

h1{
  text-align:center;
  font-size:22px;
  font-weight:900;
}

.artist{
  text-align:center;
  color:var(--muted);
  margin-top:6px;
}

/* spacing instead of badge */
.spacer{
  height:10px;
}

/* SECTION */
.section{
  margin-top:24px;
  font-size:11px;
  text-align:center;
  color:var(--muted2);
  letter-spacing:2px;
  font-weight:800;
  text-transform:uppercase;
}

/* BUTTONS */
.platforms{
  display:flex;
  flex-direction:column;
  gap:14px;
  margin-top:14px;
}

.btn{
  text-decoration:none;
  padding:16px;
  border-radius:18px;
  display:flex;
  align-items:center;
  justify-content:center;
  border:1px solid rgba(255,255,255,.10);
  transition:.2s;
}

.btn:hover{
  transform:translateY(-2px);
}

.spotify{
  background:linear-gradient(90deg,#62e6ff,#7b7dff,#ff63c6);
  color:black;
  font-weight:800;
}

.darkbtn{
  background:rgba(255,255,255,.05);
  color:white;
}

/* DIVIDER */
.divider{
  margin:24px auto;
  width:80%;
  height:1px;
  background:linear-gradient(90deg, transparent, rgba(255,255,255,.2), transparent);
}

/* FAN CARDS FIXED */
.fan-card{
  background:rgba(255,255,255,.05);
  border-radius:18px;
  padding:18px;
  display:flex;
  flex-direction:column;
  justify-content:center;
  min-height:86px;
}

.fan-title{
  font-weight:800;
  font-size:16px;
  margin-bottom:6px;
}

.fan-meta{
  font-size:13px;
  color:var(--muted2);
}

/* FOOTER */
.footer{
  margin-top:20px;
  text-align:center;
  font-size:12px;
  color:var(--muted2);
}
</style>
</head>

<body>

<div class="wrap">

  <div class="brand">
    <b>OMK Records</b>
    <span>Official links</span>
  </div>

  <img src="https://raw.githubusercontent.com/omk-store/omk-website/main/914C5ED9-2BF8-4515-9320-9169F7E32FBB.png" class="cover">

  <h1>BENIN TO LAGOS</h1>
  <div class="artist">Omo Taker</div>

  <div class="spacer"></div>

  <!-- LISTEN -->
  <div class="section">Listen Now</div>

  <div class="platforms">
    <a class="btn spotify" href="https://open.spotify.com/track/0SooNM8i9p1UiE7HTTp5C4">
      ▶ Play on Spotify
    </a>

    <a class="btn darkbtn" href="https://music.apple.com/ng/album/benin-to-lagos/1866424075?i=1866424076">
      Apple Music
    </a>

    <a class="btn darkbtn" href="https://www.boomplay.com/songs/231357454">
      Boomplay
    </a>

    <a class="btn darkbtn" href="https://audiomack.com/iam_omotaker/song/benin-to-lagos">
      Audiomack
    </a>
  </div>

  <div class="divider"></div>

  <!-- FAN FAVORITES -->
  <div class="section">🔥 Fan Favorites</div>

  <div class="platforms">
    <div class="fan-card">
      <div class="fan-title">My Truth</div>
      <div class="fan-meta">219K+ streams</div>
    </div>

    <div class="fan-card">
      <div class="fan-title">Bend Down Select</div>
      <div class="fan-meta">84K+ streams</div>
    </div>

    <div class="fan-card">
      <div class="fan-title">You + You</div>
      <div class="fan-meta">26K+ streams</div>
    </div>
  </div>

  <!-- FOLLOW -->
  <div class="section">Follow OMK</div>

  <div class="platforms">
    <a class="btn spotify" href="https://instagram.com/iam__omotaker">
      Follow on Instagram
    </a>
  </div>

  <div class="footer">© 2026 Omo Taker • OMK Records</div>

</div>

</body>
</html>
