<title>Benin To Lagos - Omo Taker</title>

<style>
body{
  margin:0;
  font-family:Arial, sans-serif;
  background:#020617;
  color:#fff;
  display:flex;
  justify-content:center;
}

.container{
  width:90%;
  max-width:420px;
  text-align:center;
}

/* IMAGE */
.banner img{
  width:100%;
  border-radius:20px;
  margin-top:20px;
}

/* TEXT */
.title{
  font-size:26px;
  margin-top:15px;
}
.sub{
  opacity:.7;
  margin-bottom:18px;
}

/* BUTTON */
.btn{
  display:flex;
  align-items:center;
  justify-content:center;
  gap:12px;
  padding:18px;
  margin:12px 0;
  border-radius:22px;
  text-decoration:none;
  font-weight:bold;
  font-size:18px;
  color:#fff;
  background:rgba(255,255,255,.06);
  border:1px solid rgba(255,255,255,.08);
  transition:.3s;
}

.btn:hover{
  transform:scale(1.04);
}

/* LOGO */
.logo{
  width:28px;
  height:28px;
}

/* COLORS + GLOW */
.spotify{
  color:#1DB954;
  border-color:#1DB954;
  box-shadow:0 0 18px rgba(29,185,84,.25);
}

.apple{
  color:#fff;
  border-color:rgba(255,255,255,.3);
}

.audiomack{
  color:#ffb300;
  border-color:#ffb300;
  box-shadow:0 0 18px rgba(255,179,0,.25);
}

.boomplay{
  color:#00d4ff;
  border-color:#00d4ff;
  box-shadow:0 0 18px rgba(0,212,255,.25);
}

.youtube{
  background:linear-gradient(135deg,#ff0033,#ff4b4b);
  border:none;
  box-shadow:0 0 25px rgba(255,0,0,.4);
}

.tiktok{
  border-color:rgba(255,255,255,.2);
}

/* FOOTER */
.footer{
  margin-top:20px;
  font-size:13px;
  opacity:.6;
}

.site{
  margin-top:10px;
  display:inline-block;
  padding:10px 20px;
  border-radius:20px;
  background:rgba(255,255,255,.08);
}
</style>
</head>

<body>

<div class="container">

<!-- IMAGE -->
<div class="banner">
