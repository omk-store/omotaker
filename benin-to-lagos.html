<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Benin To Lagos - Omo Taker</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background:
    radial-gradient(circle at 20% 20%, rgba(0,240,255,0.12), transparent 28%),
    radial-gradient(circle at 80% 80%, rgba(255,0,200,0.12), transparent 30%),
    #020617;
  color: white;
  display: flex;
  justify-content: center;
  align-items: center;
  min-height: 100vh;
}

.container {
  width: 90%;
  max-width: 420px;
  text-align: center;
}

h1 {
  font-size: 28px;
  margin-bottom: 6px;
}
.sub {
  opacity: 0.8;
  margin-bottom: 18px;
}

.banner {
  border-radius: 20px;
  overflow: hidden;
  margin-bottom: 20px;
  box-shadow: 0 20px 50px rgba(0,0,0,0.5);
}
.banner img {
  width: 100%;
}

.btn {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 12px;
  padding: 15px;
  margin: 12px 0;
  border-radius: 16px;
  text-decoration: none;
  font-weight: bold;
  color: white;
  transition: 0.3s ease;
}
.btn:hover {
  transform: scale(1.05);
}

.platform {
  background: rgba(255,255,255,0.08);
  backdrop-filter: blur(10px);
}

/* COLORS */
.spotify { color: #1DB954; }
.apple { color: #ffffff; }
.audiomack { color: #ffb300; }
.boomplay { color: #00d4ff; }

.youtube {
  background: linear-gradient(135deg, #ff0033, #ff4b4b);
}

/* REAL LOGOS (BETTER SOURCES) */
.logo {
  width: 24px;
  height: 24px;
}

/* slight glow */
.btn.platform:hover {
  box-shadow: 0 0 20px rgba(255,255,255,0.15);
}

.footer {
  margin-top: 20px;
  font-size: 12px;
  opacity: 0.6;
}
</style>
</head>

<body>

<div class="container">

<h1>Benin To Lagos 🔥</h1>
<div class="sub">Tap your platform below 🎧</div>

<div class="banner">
  <img src="https://raw.githubusercontent.com/omk-store/omk-website/main/914C5ED9-2BF8-4515-9320-9169F7E32FBB.png">
</div>

<!-- STREAMING -->
<a href="https://open.spotify.com/track/0SooNM8i9p1UiE7HTTp5C4" class="btn platform spotify" target="_blank">
  <img src="https://upload.wikimedia.org/wikipedia/commons/8/84/Spotify_icon.svg" class="logo">
  Spotify
</a>

<a href="https://music.apple.com/ng/album/benin-to-lagos/1866424075?i=1866424076" class="btn platform apple" target="_blank">
  <img src="https://upload.wikimedia.org/wikipedia/commons/f/fa/Apple_logo_black.svg" class="logo">
  Apple Music
</a>

<a href="https://audiomack.com/iam_omotaker/song/benin-to-lagos" class="btn platform audiomack" target="_blank">
  <img src="https://upload.wikimedia.org/wikipedia/commons/5/5e/Audiomack_logo.png" class="logo">
  Audiomack
</a>

<a href="https://www.boomplay.com/songs/231357454" class="btn platform boomplay" target="_blank">
  <img src="https://upload.wikimedia.org/wikipedia/commons/0/0d/Boomplay_logo.png" class="logo">
  Boomplay
</a>

<!-- UPDATED LINKS -->
<a href="https://youtube.com/shorts/KwfxKwpdqJM?feature=share" class="btn youtube" target="_blank">
  <img src="https://upload.wikimedia.org/wikipedia/commons/b/b8/YouTube_Logo_2017.svg" class="logo">
  Watch on YouTube
</a>

<a href="https://vt.tiktok.com/ZS9NeLSMvq35y-PgFND/" class="btn platform" target="_blank">

  Use on TikTok
</a>

<div class="footer">
  OMK • Omo Taker 🐺
</div>

</div>

</html>
