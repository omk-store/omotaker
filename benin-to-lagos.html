<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Benin To Lagos | Omo Taker</title>
<meta name="theme-color" content="#04060d">

<style>
:root{
  --bg:#04060d;
  --text:#ffffff;
  --muted:rgba(233,240,255,.72);
  --muted2:rgba(233,240,255,.52);
  --line:rgba(255,255,255,.12);
  --glass:rgba(255,255,255,.05);
  --blue:#62e6ff;
  --violet:#7b7dff;
  --pink:#ff63c6;
  --dark:#0b0f18;
  --glow:0 24px 80px rgba(0,0,0,.58);
  --softGlow:0 12px 34px rgba(98,230,255,.16), 0 10px 28px rgba(123,125,255,.12);
}

*{
  box-sizing:border-box;
  margin:0;
  padding:0;
  font-family:Inter,system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;
  -webkit-tap-highlight-color:transparent;
}

body{
  min-height:100vh;
  background:
    radial-gradient(circle at 20% 20%, rgba(98,230,255,.15), transparent 28%),
    radial-gradient(circle at 80% 80%, rgba(255,99,198,.14), transparent 28%),
    radial-gradient(circle at 80% 10%, rgba(123,125,255,.18), transparent 24%),
    linear-gradient(180deg,#020309 0%, #07111d 50%, #04060d 100%);
  padding:26px 16px;
  display:flex;
  justify-content:center;
  align-items:center;
  color:var(--text);
  overflow-x:hidden;
}

body::before{
  content:"";
  position:fixed;
  inset:-20%;
  background:
    radial-gradient(circle at 50% 50%, rgba(255,255,255,.03), transparent 34%),
    linear-gradient(120deg, transparent 35%, rgba(98,230,255,.05) 50%, transparent 65%);
  filter:blur(20px);
  pointer-events:none;
  animation:floatAura 10s ease-in-out infinite;
}

.wrap{
  position:relative;
  width:100%;
  max-width:430px;
  background:
    linear-gradient(180deg, rgba(255,255,255,.07), rgba(255,255,255,.03)),
    linear-gradient(135deg, rgba(98,230,255,.05), rgba(255,99,198,.03));
  border-radius:32px;
  padding:18px;
  box-shadow:var(--glow);
  text-align:center;
  border:1px solid var(--line);
  backdrop-filter:blur(22px) saturate(150%);
  -webkit-backdrop-filter:blur(22px) saturate(150%);
  overflow:hidden;
}

.wrap::before{
  content:"";
  position:absolute;
  inset:0;
  background:
    linear-gradient(135deg, rgba(98,230,255,.06), transparent 30%, transparent 70%, rgba(255,99,198,.06));
  pointer-events:none;
}

.top-line{
  width:116px;
  height:6px;
  border-radius:999px;
  margin:2px auto 18px;
  background:linear-gradient(90deg, rgba(255,255,255,.18), rgba(98,230,255,.34), rgba(255,255,255,.18));
  box-shadow:0 0 20px rgba(98,230,255,.12);
}

.brand{
  position:relative;
  z-index:1;
  display:flex;
  align-items:center;
  justify-content:center;
  gap:12px;
  margin-bottom:16px;
}

.brand .logo{
  width:46px;
  height:46px;
  border-radius:14px;
  background:linear-gradient(135deg,#0a0f18,#10192a);
  display:flex;
  align-items:center;
  justify-content:center;
  color:#fff;
  font-weight:900;
  letter-spacing:.5px;
  overflow:hidden;
  border:1px solid rgba(255,255,255,.10);
  box-shadow:0 10px 24px rgba(0,0,0,.25);
}

.brand .logo img{
  width:100%;
  height:100%;
  object-fit:cover;
}

.brand .brandtext{
  text-align:left;
  line-height:1.05;
}

.brand .brandtext b{
  display:block;
  font-size:14px;
  color:#fff;
}

.brand .brandtext span{
  display:block;
  font-size:12px;
  color:var(--muted);
  margin-top:4px;
}

.cover-link{
  position:relative;
  z-index:1;
  display:block;
  text-decoration:none;
  border-radius:22px;
  overflow:hidden;
  margin-bottom:16px;
}

.cover{
  width:100%;
  max-height:380px;
  object-fit:cover;
  display:block;
  border-radius:22px;
  border:1px solid rgba(255,255,255,.12);
  box-shadow:0 18px 40px rgba(0,0,0,.38);
  transition:transform .3s ease, filter .3s ease, box-shadow .3s ease;
}

.cover-link:hover .cover{
  transform:scale(1.015);
  filter:brightness(1.03);
  box-shadow:0 22px 48px rgba(0,0,0,.44), 0 0 30px rgba(98,230,255,.08);
}

.cover-link::after{
  content:"Tap Cover To Open Spotify";
  position:absolute;
  left:50%;
  bottom:14px;
  transform:translateX(-50%);
  padding:8px 12px;
  border-radius:999px;
  background:rgba(7,12,20,.58);
  border:1px solid rgba(255,255,255,.12);
  color:#fff;
  font-size:10px;
  font-weight:800;
  letter-spacing:1.3px;
  backdrop-filter:blur(10px);
  -webkit-backdrop-filter:blur(10px);
  opacity:0;
  transition:opacity .25s ease;
  white-space:nowrap;
}

.cover-link:hover::after{
  opacity:1;
}

h1{
  position:relative;
  z-index:1;
  font-size:22px;
  font-weight:950;
  letter-spacing:1.4px;
  color:#fff;
  line-height:1.08;
}

.artist{
  position:relative;
  z-index:1;
  font-size:14px;
  color:var(--muted);
  margin-top:8px;
  font-weight:800;
}

.status{
  position:relative;
  z-index:1;
  display:inline-block;
  font-size:12px;
  font-weight:900;
  color:#fff;
  margin:12px 0 14px;
  padding:9px 18px;
  border-radius:999px;
  background:linear-gradient(90deg,#7b7dff,#ff63c6);
  box-shadow:0 10px 24px rgba(0,0,0,.25);
}

.tap{
  position:relative;
  z-index:1;
  font-size:11px;
  letter-spacing:2.8px;
  font-weight:900;
  margin-bottom:12px;
  color:rgba(255,255,255,.80);
}

.section{
  position:relative;
  z-index:1;
  text-align:left;
  margin:12px 4px 10px;
  color:var(--muted2);
  font-size:11px;
  font-weight:900;
  letter-spacing:2px;
}

.platforms{
  position:relative;
  z-index:1;
  display:grid;
  grid-template-columns:1fr;
  gap:12px;
  margin-bottom:14px;
}

.btn{
  position:relative;
  text-decoration:none;
  border-radius:18px;
  padding:15px 14px;
  font-weight:900;
  font-size:14px;
  letter-spacing:.6px;
  display:flex;
  align-items:center;
  justify-content:flex-start;
  gap:10px;
  border:1px solid var(--line);
  transition:transform .18s ease, box-shadow .18s ease, border-color .18s ease;
  min-height:56px;
  user-select:none;
  overflow:hidden;
}

.btn::before{
  content:"";
  position:absolute;
  inset:0;
  background:linear-gradient(115deg, transparent 20%, rgba(255,255,255,.08) 50%, transparent 80%);
  transform:translateX(-120%);
  transition:transform .45s ease;
}

.btn:hover{
  transform:translateY(-2px);
}

.btn:hover::before{
  transform:translateX(120%);
}

.btn:active{
  transform:scale(.985);
}

.icon{
  width:34px;
  height:34px;
  border-radius:12px;
  display:flex;
  align-items:center;
  justify-content:center;
  flex:0 0 34px;
}

.icon img{
  width:18px;
  height:18px;
  display:block;
}

/* styles */
.spotify{
  background:linear-gradient(90deg,var(--blue),var(--violet));
  color:#06111d;
  border-color:rgba(255,255,255,.16);
  box-shadow:var(--softGlow);
}
.spotify .icon{
  background:rgba(6,17,29,.12);
}

.apple{
  background:rgba(255,255,255,.08);
  color:#fff;
}
.apple .icon{
  background:rgba(255,255,255,.12);
}

.darkbtn{
  background:rgba(255,255,255,.04);
  color:#fff;
}
.darkbtn .icon{
  background:rgba(255,255,255,.10);
}

.instagram{
  background:linear-gradient(90deg,#ff4c93,#ff6fb1);
  color:#fff;
  border-color:rgba(255,255,255,.10);
}
.instagram .icon{
  background:rgba(255,255,255,.16);
}

.tiktok{
  background:linear-gradient(90deg,#0c111b,#161f31);
  color:#fff;
}
.tiktok .icon{
  background:rgba(255,255,255,.12);
}

.shop{
  width:100%;
  padding:16px;
  border-radius:999px;
  font-size:15px;
  font-weight:1000;
  border:1px solid rgba(255,255,255,.14);
  background:linear-gradient(90deg,#0d1523,#131f33);
  color:#fff;
  cursor:pointer;
  margin-top:6px;
  box-shadow:0 12px 28px rgba(0,0,0,.22);
  transition:transform .18s ease, box-shadow .18s ease;
}

.shop:active{
  transform:scale(.99);
}

.smallnote{
  position:relative;
  z-index:1;
  font-size:12px;
  color:var(--muted2);
  margin-top:10px;
}

.footer{
  position:relative;
  z-index:1;
  margin-top:14px;
  font-size:12px;
  color:var(--muted2);
}

@keyframes floatAura{
  0%,100%{ transform:translateY(0) scale(1); }
  50%{ transform:translateY(-10px) scale(1.02); }
}

@media (max-width:360px){
  .btn{font-size:13px}
  .wrap{padding:16px}
  h1{font-size:20px}
}
</style>
</head>
