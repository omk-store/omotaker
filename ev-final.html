<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Everyday Vibe</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #0b0f1a;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
}

/* Card */
.card {
  width: 100%;
  max-width: 420px;
  background: #1a1a1a;
  border-radius: 16px;
  overflow: hidden;
}

/* Banner */
.banner {
  width: 100%;
}

/* Content */
.content {
  padding: 20px;
  color: white;
}

/* Title */
.title {
  text-align: center;
  margin-bottom: 20px;
  font-size: 18px;
}

/* Buttons */
.platform {
  display: flex;
  justify-content: space-between;
  align-items: center;
  background: #111;
  border-radius: 12px;
  padding: 15px;
  margin-bottom: 12px;
  border: 1px solid #333;
}

.platform span {
  font-weight: bold;
}

/* Button */
.btn {
  padding: 8px 16px;
  border-radius: 8px;
  text-decoration: none;
  font-size: 13px;
  border: 1px solid #555;
  color: white;
}

/* Colors */
.spotify span {
  color: #1DB954;
}
</style>

</head>

<body>

<div class="card">

<img class="banner" src="https://raw.githubusercontent.com/omk-store/omotaker/refs/heads/main/6AC61EB2-B4B3-4CB6-927D-9B4E8C7AF9E8.jpeg">

<div class="content">

<div class="title">Top 100 Nigeria Chart</div>

<div class="platform spotify">
  <span>Spotify</span>
  <a href="https://open.spotify.com/playlist/1Ox7VYqq4rFq1gYPPRP8Fh?si=HqDyzh4TTea6XySKb3oJHw" class="btn">PLAY ▶</a>
</div>

<div class="platform">
  <span>Apple Music</span>
  <a href="https://music.apple.com/ng/playlist/everyday-vibe/pl.u-DdAN8l3TN2ANagg" class="btn">PLAY ▶</a>
</div>

</div>

</div>

</body>
</html>
