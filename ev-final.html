<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Everyday Vibe</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: radial-gradient(circle at top, #0f172a, #020617);
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
  overflow: hidden;
}

/* FLOATING BACKGROUND LINES */
.bg-lines {
  position: absolute;
  width: 100%;
  height: 100%;
  pointer-events: none;
}

.bg-lines::before,
.bg-lines::after {
  content: "";
  position: absolute;
  width: 200%;
  height: 200%;
  background: url('https://svgshare.com/i/13sN.svg') repeat;
  opacity: 0.06;
  animation: moveLines 40s linear infinite;
}

.bg-lines::after {
  animation-direction: reverse;
}

@keyframes moveLines {
  from { transform: translate(0,0); }
  to { transform: translate(-200px,-200px); }
}

/* Card */
.card {
  position: relative;
  width: 100%;
  max-width: 420px;
  background: linear-gradient(180deg, #0f172a, #020617);
  border-radius: 20px;
  overflow: hidden;
  box-shadow: 0 20px 60px rgba(0,0,0,0.8);
  border: 1px solid rgba(255,255,255,0.05);
  z-index: 2;
}

/* Banner */
.banner {
  width: 100%;
}

/* Content */
.content {
  padding: 22px;
  color: white;
}

/* Title */
.title {
  text-align: center;
  font-size: 18px;
  font-weight: bold;
  margin-bottom: 20px;
}

/* Platform box */
.platform {
  display: flex;
  justify-content: space-between;
  align-items: center;
  background: rgba(255,255,255,0.03);
  border-radius: 14px;
  padding: 16px;
  margin-bottom: 14px;
  border: 1px solid rgba(255,255,255,0.08);
  backdrop-filter: blur(10px);
}

/* Text */
.platform span {
  font-size: 16px;
  font-weight: 600;
}

/* Spotify */
.spotify span {
  color: #1DB954;
}

/* Buttons */
.btn {
  padding: 10px 16px;
  border-radius: 10px;
  text-decoration: none;
  font-size: 13px;
  font-weight: bold;
  display: flex;
  align-items: center;
  gap: 6px;
}

/* Spotify button */
.spotify-btn {
  background: linear-gradient(135deg, #1DB954, #1ed760);
  color: black;
  box-shadow: 0 0 15px rgba(29,185,84,0.4);
}

/* Apple button */
.apple-btn {
  background: linear-gradient(135deg, #ffffff, #d1d5db);
  color: black;
}

/* Footer */
.footer {
  text-align: center;
  font-size: 11px;
  opacity: 0.5;
  margin-top: 10px;
}
</style>
</head>

<body>

<div class="bg-lines"></div>

<div class="card">

  <img class="banner" src="https://raw.githubusercontent.com/omk-store/omotaker/refs/heads/main/6AC61EB2-B4B3-4CB6-927D-9B4E8C7AF9E8.jpeg">

  <div class="content">

    <div class="title">Top 100 Everyday Vibe Nigeria 🇳🇬</div>

    <div class="platform spotify">
      <span>Spotify</span>
      <a href="https://open.spotify.com/playlist/1Ox7VYqq4rFq1gYPPRP8Fh?si=HqDyzh4TTea6XySKb3oJHw" class="btn spotify-btn">
        ▶ Play
      </a>
    </div>

    <div class="platform">
      <span>Apple Music</span>
      <a href="https://music.apple.com/ng/playlist/everyday-vibe/pl.u-DdAN8l3TN2ANagg" class="btn apple-btn">
        ▶ Play
      </a>
    </div>

    <div class="footer">
      Powered by Everyday Vibe 🌍
    </div>

  </div>

</div>

</body>
</html>
