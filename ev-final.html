<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Everyday Vibe</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;

  background: radial-gradient(circle at 20% 20%, #1DB95433, transparent),
              radial-gradient(circle at 80% 80%, #3b82f633, transparent),
              #020617;
}

/* CARD */
.card {
  width: 100%;
  max-width: 420px;
  border-radius: 22px;
  overflow: hidden;

  background: rgba(15,23,42,0.6);
  backdrop-filter: blur(20px);

  border: 1px solid rgba(255,255,255,0.06);
  box-shadow: 0 20px 80px rgba(0,0,0,0.9);
}

/* IMAGE */
.banner {
  width: 100%;
  display: block;
}

/* CONTENT */
.content {
  padding: 22px;
  color: white;
}

/* TITLE */
.title {
  text-align: center;
  font-size: 18px;
  font-weight: 600;
  margin-bottom: 8px;
}

/* SUBTEXT */
.sub {
  text-align: center;
  font-size: 13px;
  opacity: 0.7;
  margin-bottom: 20px;
  animation: blink 1.5s infinite;
}

@keyframes blink {
  0%,100% { opacity: 0.4; }
  50% { opacity: 1; }
}

/* PLATFORM BOX */
.platform {
  display: flex;
  justify-content: space-between;
  align-items: center;

  padding: 16px;
  margin-bottom: 14px;

  border-radius: 14px;
  background: rgba(255,255,255,0.03);
  border: 1px solid rgba(255,255,255,0.06);

  transition: 0.2s;
}

.platform:hover {
  background: rgba(255,255,255,0.06);
  transform: scale(1.02);
}

/* TEXT */
.platform span {
  font-weight: 600;
}

/* SPOTIFY */
.spotify span {
  color: #1DB954;
}

/* BUTTON */
.btn {
  padding: 10px 18px;
  border-radius: 999px;
  text-decoration: none;
  font-size: 13px;
  font-weight: bold;
  display: flex;
  align-items: center;
  gap: 6px;
  transition: 0.2s;
}

.btn:active {
  transform: scale(0.9);
}

/* SPOTIFY BUTTON (BIGGER + GLOW) */
.spotify-btn {
  background: #1DB954;
  color: black;
  padding: 12px 22px;
  box-shadow: 0 0 15px rgba(29,185,84,0.6);
  animation: pulse 1.5s infinite;
}

@keyframes pulse {
  0% { box-shadow: 0 0 0px rgba(29,185,84,0.6); }
  50% { box-shadow: 0 0 25px rgba(29,185,84,1); }
  100% { box-shadow: 0 0 0px rgba(29,185,84,0.6); }
}

/* APPLE BUTTON */
.apple-btn {
  background: #ffffff;
  color: black;
}

/* FOOTER */
.footer {
  text-align: center;
  font-size: 11px;
  opacity: 0.5;
  margin-top: 10px;
}
</style>
</head>

<body>

<div class="card">

<img class="banner" src="https://raw.githubusercontent.com/omk-store/omotaker/refs/heads/main/6AC61EB2-B4B3-4CB6-927D-9B4E8C7AF9E8.jpeg">

<div class="content">

<div class="title">Top 100 Everyday Vibe Nigeria 🇳🇬</div>
<div class="sub">Choose your platform 👇</div>

<div class="platform spotify">
  <span>Spotify</span>
  <a href="https://open.spotify.com/playlist/1Ox7VYqq4rFq1gYPPRP8Fh?si=HqDyzh4TTea6XySKb3oJHw" class="btn spotify-btn">
    ▶ Play
  </a>
</div>

<div class="platform">
  <span>Apple Music</span>
  <a href="https://music.apple.com/ng/playlist/everyday-vibe/pl.u-DdAN8l3TN2ANagg" class="btn apple-btn">
    ▶ Play
  </a>
</div>

<div class="footer">
  Powered by Everyday Vibe 🌍
</div>

</div>

</div>

</body>
</html>
