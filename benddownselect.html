<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bend Down Select - Omo Taker</title>

<style>
:root {
  --bg: #020617;
  --card: rgba(255,255,255,0.08);
  --card-border: rgba(255,255,255,0.12);
  --text-soft: rgba(255,255,255,0.72);
}

* {
  box-sizing: border-box;
}

body {
  margin: 0;
  font-family: Arial, sans-serif;
  background:
    radial-gradient(circle at 20% 20%, rgba(0,240,255,0.12), transparent),
    radial-gradient(circle at 80% 80%, rgba(255,0,200,0.12), transparent),
    #020617;
  color: white;
  display: flex;
  justify-content: center;
  align-items: center;
  min-height: 100vh;
}

/* CONTAINER */
.container {
  width: 90%;
  max-width: 420px;
  padding: 24px 18px;
  border-radius: 24px;
  background: rgba(255,255,255,0.05);
  backdrop-filter: blur(14px);
  text-align: center;
}

/* TITLE */
h1 {
  font-size: 28px;
  margin-bottom: 6px;
}

.sub {
  opacity: 0.8;
  margin-bottom: 18px;
}

/* IMAGE */
.cover img {
  width: 100%;
  border-radius: 18px;
  margin-bottom: 20px;
}

/* BUTTON */
.btn {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 10px;
  padding: 14px;
  margin: 10px 0;
  border-radius: 16px;
  text-decoration: none;
  font-weight: bold;
  background: rgba(255,255,255,0.08);
  color: white;
  transition: 0.2s;
}

.btn:hover {
  transform: scale(1.04);
}

/* SPECIAL */
.spotify {
  background: linear-gradient(135deg, #1DB954, #0f7a3e);
}

.youtube {
  background: linear-gradient(135deg, #ff0033, #ff4b4b);
}

/* LOGO */
.logo {
  width: 22px;
  height: 22px;
  object-fit: contain;
}
</style>
</head>

<body>

<div class="container">

<h1>Bend Down Select 🔥</h1>
<div class="sub">Stream now everywhere 🎧🔥</div>

<!-- COVER IMAGE -->
<div class="cover">
  <img src="https://raw.githubusercontent.com/omk-store/omotaker/refs/heads/main/IMG_9918.jpeg">
</div>

<!-- BUTTONS -->

<a href="https://open.spotify.com/track/591YkWluaQeC3tGMWhSFWu" class="btn spotify" target="_blank">
  <img src="https://cdn-icons-png.flaticon.com/512/174/174872.png" class="logo">
  Spotify
</a>

<a href="https://music.apple.com/ng/album/bend-down-select/1829791125?i=1829791127" class="btn" target="_blank">
  <img src="https://cdn-icons-png.flaticon.com/512/731/731985.png" class="logo">
  Apple Music
</a>

<a href="https://audiomack.com/iam_omotaker/song/bend-down-select-1449797" class="btn" target="_blank">
  <img src="https://cdn-icons-png.flaticon.com/512/5968/5968885.png" class="logo">
  Audiomack
</a>

<a href="https://www.boomplay.com/songs/212979254" class="btn" target="_blank">
  <img src="https://cdn-icons-png.flaticon.com/512/727/727269.png" class="logo">
  Boomplay
</a>

<a href="https://vt.tiktok.com/ZS9LFrn8pEQJE-RA0My/" class="btn" target="_blank">
  <img src="https://cdn-icons-png.flaticon.com/512/3046/3046121.png" class="logo">
  Use on TikTok
</a>

<a href="https://youtu.be/7qlRs1gDnMI" class="btn youtube" target="_blank">
  <img src="https://cdn-icons-png.flaticon.com/512/1384/1384060.png" class="logo">
  YouTube
</a>

</div>

</body>
</html>
