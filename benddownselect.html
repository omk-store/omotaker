<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bend Down Select - Omo Taker</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: radial-gradient(circle at 20% 20%, #00f0ff22, transparent),
              radial-gradient(circle at 80% 80%, #ff00c822, transparent),
              #020617;
  color: white;
  display: flex;
  justify-content: center;
  align-items: center;
  min-height: 100vh;
  text-align: center;
}

.container {
  width: 90%;
  max-width: 420px;
  padding: 24px;
  border-radius: 24px;
  background: rgba(255,255,255,0.05);
  backdrop-filter: blur(12px);
}

h1 {
  font-size: 28px;
  margin-bottom: 6px;
}

.sub {
  opacity: 0.85;
  margin-bottom: 16px;
}

/* VIDEO */
.video {
  border-radius: 18px;
  overflow: hidden;
  margin-bottom: 20px;
}

video {
  width: 100%;
  display: block;
}

/* BUTTONS */
.btn {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 12px;
  padding: 15px;
  margin: 10px 0;
  border-radius: 14px;
  text-decoration: none;
  font-weight: bold;
  background: rgba(255,255,255,0.08);
  color: white;
  transition: 0.3s;
}

.btn:hover {
  transform: scale(1.05);
  box-shadow: 0 0 25px rgba(0,240,255,0.25);
}

.spotify {
  background: linear-gradient(135deg, #1DB954, #0f7a3e);
}

.youtube {
  background: linear-gradient(135deg, #ff0033, #ff4b4b);
}

/* LOGOS */
.logo {
  width: 22px;
  height: 22px;
  filter: invert(1);
}
</style>
</head>

<body>

<div class="container">

<h1>Bend Down Select 🔥</h1>
<div class="sub">Stream now everywhere 🎧🔥</div>

<!-- VIDEO -->
<div class="video">

  </video>
</div>

<!-- BUTTONS -->

<a href="https://open.spotify.com/track/591YkWluaQeC3tGMWhSFWu" class="btn spotify">
  <img src="https://cdn.jsdelivr.net/gh/simple-icons/simple-icons/icons/spotify.svg" class="logo">
  Spotify
</a>

<a href="https://music.apple.com/ng/album/bend-down-select/1829791125?i=1829791127" class="btn">
  <img src="https://cdn.jsdelivr.net/gh/simple-icons/simple-icons/icons/applemusic.svg" class="logo">
  Apple Music
</a>

<a href="https://audiomack.com/iam_omotaker/song/bend-down-select-1449797" class="btn">

  Audiomack
</a>

<a href="https://www.boomplay.com/songs/212979254" class="btn">
  <img src="https://cdn.jsdelivr.net/gh/simple-icons/simple-icons/icons/boomplay.svg" class="logo">

<a href="https://vt.tiktok.com/ZS9LFrn8pEQJE-RA0My/" class="btn">
  <img src="https://cdn.jsdelivr.net/gh/simple-icons/simple-icons/icons/tiktok.svg" class="logo">
  Use on TikTok

<a href="https://youtu.be/7qlRs1gDnMI" class="btn youtube">

  YouTube
</a>

</div>

</body>
</html>
