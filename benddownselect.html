<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bend Down Select - Omo Taker</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #020617;
  color: white;
  display: flex;
  justify-content: center;
  align-items: center;
  min-height: 100vh;
  text-align: center;
  overflow-x: hidden;
}

/* ANIMATED BACKGROUND */
body::before, body::after {
  content: "";
  position: absolute;
  width: 500px;
  height: 500px;
  border-radius: 50%;
  filter: blur(120px);
  opacity: 0.3;
  animation: float 8s infinite alternate;
}

body::before {
  background: #00f0ff;
  top: 5%;
  left: 5%;
}

body::after {
  background: #ff00c8;
  bottom: 5%;
  right: 5%;
}

@keyframes float {
  from { transform: translateY(0px); }
  to { transform: translateY(40px); }
}

.container {
  width: 90%;
  max-width: 420px;
  z-index: 2;
  animation: fadeIn 1s ease;
}

@keyframes fadeIn {
  from { opacity: 0; transform: translateY(20px);}
  to { opacity: 1; transform: translateY(0);}
}

/* TITLE */
h1 {
  font-size: 28px;
  margin-bottom: 5px;
}

.sub {
  opacity: 0.7;
  margin-bottom: 10px;
}

/* SOCIAL PROOF */
.stats {
  font-size: 13px;
  opacity: 0.6;
  margin-bottom: 15px;
}

/* VIDEO */
.video {
  border-radius: 14px;
  overflow: hidden;
  margin-bottom: 15px;
}

iframe {
  width: 100%;
  height: 220px;
  border: none;
}

/* BUTTONS */
.btn {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 10px;
  padding: 14px;
  margin: 10px 0;
  border-radius: 14px;
  text-decoration: none;
  font-weight: bold;
  transition: 0.3s;
}

/* YOUTUBE */
.youtube {
  background: linear-gradient(45deg, #ff0000, #ff4d4d);
  box-shadow: 0 0 20px rgba(255,0,0,0.4);
}

/* PLATFORM */
.platform {
  background: rgba(255,255,255,0.08);
  backdrop-filter: blur(10px);
}

/* HOVER */
.btn:hover {
  transform: scale(1.06);
}

/* LOGOS */
.logo {
  width: 20px;
  height: 20px;
}

/* FOOTER */
.footer {
  margin-top: 20px;
  font-size: 12px;
  opacity: 0.5;
}
</style>
</head>

<body>

<div class="container">

<h1>Bend Down Select 🔥</h1>
<div class="sub">Watch first. Then stream everywhere 🎧</div>
<div class="stats">Fan energy rising ⚡ Tap your platform below</div>

<!-- VIDEO -->
<div class="video">
<iframe src="https://www.youtube.com/embed/7qlRs1gDnMI" allowfullscreen></iframe>
</div>

<!-- BUTTONS -->
<a href="https://youtu.be/7qlRs1gDnMI" class="btn youtube" target="_blank">
<img src="https://cdn-icons-png.flaticon.com/512/1384/1384060.png" class="logo">
Watch on YouTube
</a>

<a href="https://open.spotify.com/track/591YkWluaQeC3tGMWhSFWu" class="btn platform" target="_blank">
<img src="https://cdn-icons-png.flaticon.com/512/174/174872.png" class="logo">
Spotify
</a>

<a href="https://music.apple.com/ng/album/bend-down-select/1829791125?i=1829791127" class="btn platform" target="_blank">
<img src="https://cdn-icons-png.flaticon.com/512/731/731985.png" class="logo">
Apple Music
</a>

<a href="https://audiomack.com/iam_omotaker/song/benin-to-lagos" class="btn platform" target="_blank">
<img src="https://cdn-icons-png.flaticon.com/512/5968/5968885.png" class="logo">
Audiomack
</a>

<a href="https://www.boomplay.com/songs/231357454" class="btn platform" target="_blank">
<img src="https://cdn-icons-png.flaticon.com/512/727/727269.png" class="logo">
Boomplay
</a>

<div class="footer">
OMK • Omo Taker 🐺
</div>

</div>

</body>
</html>
