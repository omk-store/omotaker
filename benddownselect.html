<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bend Down Select - Omo Taker</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: radial-gradient(circle at 20% 20%, #00f0ff22, transparent),
              radial-gradient(circle at 80% 80%, #ff00c822, transparent),
              #020617;
  color: white;
  display: flex;
  justify-content: center;
  align-items: center;
  min-height: 100vh;
}

.container {
  width: 90%;
  max-width: 420px;
  padding: 20px;
  border-radius: 20px;
  background: rgba(255,255,255,0.05);
  backdrop-filter: blur(12px);
}

/* VIDEO / IMAGE */
.video {
  border-radius: 16px;
  overflow: hidden;
  margin-bottom: 18px;
}

video, img {
  width: 100%;
  display: block;
}

/* BUTTON */
.btn {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 10px;
  padding: 14px;
  margin: 10px 0;
  border-radius: 12px;
  text-decoration: none;
  font-weight: bold;
  background: rgba(255,255,255,0.08);
  color: white;
  transition: 0.3s;
}

.btn:hover {
  transform: scale(1.04);
}

/* SPECIAL */
.spotify {
  background: linear-gradient(135deg, #1DB954, #0f7a3e);
}

.youtube {
  background: linear-gradient(135deg, #ff0033, #ff4b4b);
}

/* LOGO */
.logo {
  width: 20px;
  height: 20px;
  filter: invert(1);
}
</style>
</head>

<body>

<div class="container">

<h2>Bend Down Select 🔥</h2>
<p>Stream now everywhere 🎧🔥</p>

<!-- VIDEO WITH FALLBACK -->
<div class="video">
  <video autoplay muted loop playsinline onerror="this.style.display='none'; document.getElementById('fallback').style.display='block';">
    <source src="https://raw.githubusercontent.com/omk-store/omotaker/main/omotaker/copy_4D01C713-C4B1-4E9A-B273-C1DCD454B8E7.mov">
  </video>

  <!-- FALLBACK IMAGE -->
  <img id="fallback" src="https://via.placeholder.com/400x500" style="display:none;">
</div>

<!-- BUTTONS -->

<a href="https://open.spotify.com/track/591YkWluaQeC3tGMWhSFWu" class="btn spotify">
  <img src="https://cdn.jsdelivr.net/gh/simple-icons/simple-icons/icons/spotify.svg" class="logo">
  Spotify
</a>

<a href="https://music.apple.com/ng/album/bend-down-select/1829791125?i=1829791127" class="btn">
  <img src="https://cdn.jsdelivr.net/gh/simple-icons/simple-icons/icons/applemusic.svg" class="logo">
  Apple Music
</a>

<a href="https://audiomack.com/iam_omotaker/song/bend-down-select-1449797" class="btn">
  <img src="https://cdn.jsdelivr.net/gh/simple-icons/simple-icons/icons/audiomack.svg" class="logo">
  Audiomack
</a>

<a href="https://www.boomplay.com/songs/212979254" class="btn">
  <img src="https://img.icons8.com/?size=100&id=11144&format=png&color=ffffff" class="logo">
  Boomplay
</a>

<a href="https://vt.tiktok.com/ZS9LFrn8pEQJE-RA0My/" class="btn">
  <img src="https://cdn.jsdelivr.net/gh/simple-icons/simple-icons/icons/tiktok.svg" class="logo">
  Use on TikTok
</a>

<a href="https://youtu.be/7qlRs1gDnMI" class="btn youtube">
  <img src="https://cdn.jsdelivr.net/gh/simple-icons/simple-icons/icons/youtube.svg" class="logo">
  YouTube
</a>

</div>

</body>
</html>
