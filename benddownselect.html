<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bend Down Select - Omo Taker</title>

<style>
:root {
  --bg: #020617;
}

* { box-sizing: border-box; }

body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #020617;
  color: white;
  display: flex;
  justify-content: center;
  align-items: center;
  min-height: 100vh;
  text-align: center;
}

/* CONTAINER */
.container {
  width: 90%;
  max-width: 420px;
  padding: 22px;
  border-radius: 22px;
  background: rgba(255,255,255,0.05);
  backdrop-filter: blur(16px);
  border: 1px solid rgba(255,255,255,0.08);
}

/* TITLE */
h1 {
  margin: 10px 0;
  font-size: 28px;
}

.sub {
  opacity: 0.8;
  margin-bottom: 15px;
}

/* COVER */
.cover {
  border-radius: 16px;
  overflow: hidden;
  margin-bottom: 18px;
}

.cover img {
  width: 100%;
  display: block;
}

/* BUTTONS */
.btn {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 10px;
  padding: 14px;
  margin: 10px 0;
  border-radius: 14px;
  text-decoration: none;
  font-weight: bold;
  color: white;
}

/* SPOTIFY (MAIN) */
.spotify {
  background: #1DB954;
  box-shadow: 0 0 20px rgba(29,185,84,0.4);
  transform: scale(1.05);
}

/* OTHERS */
.platform {
  background: rgba(255,255,255,0.08);
}

/* ICON */
.logo {
  width: 20px;
}

/* FOOTER */
.footer {
  margin-top: 15px;
  font-size: 12px;
  opacity: 0.6;
}
</style>
</head>

<body>

<div class="container">

<h1>Bend Down Select 🔥</h1>
<div class="sub">Stream now everywhere 🎧🔥</div>

<!-- COVER IMAGE -->
<div class="cover">

</div>

<!-- BUTTONS -->
<a href="https://open.spotify.com/track/591YkWluaQeC3tGMWhSFWu" class="btn spotify" target="_blank">
  <img src="https://cdn-icons-png.flaticon.com/512/174/174872.png" class="logo">
  Spotify
</a>

<a href="https://music.apple.com/ng/album/bend-down-select/1829791125?i=1829791127" class="btn platform" target="_blank">
  <img src="https://cdn-icons-png.flaticon.com/512/731/731985.png" class="logo">
  Apple Music
</a>

<a href="https://audiomack.com/iam_omotaker/song/bend-down-select-1449797" class="btn platform" target="_blank">

  Audiomack
</a>

<a href="https://www.boomplay.com/songs/212979254" class="btn platform" target="_blank">
  <img src="https://cdn-icons-png.flaticon.com/512/727/727269.png" class="logo">

<a href="https://vt.tiktok.com/ZS9LFrn8pEQJE-RA0My/" class="btn platform" target="_blank">

  Use on TikTok

<div class="footer">
OMK • Omo Taker 🐺
</div>

</div>

</html>
