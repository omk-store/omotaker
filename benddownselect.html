<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bend Down Select - Omo Taker</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background:
    radial-gradient(circle at 20% 20%, rgba(0,240,255,0.12), transparent 28%),
    radial-gradient(circle at 80% 80%, rgba(255,0,200,0.12), transparent 30%),
    #020617;
  color: white;
  display: flex;
  justify-content: center;
  align-items: center;
  min-height: 100vh;
}

.container {
  width: 90%;
  max-width: 420px;
  text-align: center;
}

/* TITLE */
h1 {
  font-size: 30px;
  margin-bottom: 8px;
}

.sub {
  opacity: 0.8;
  margin-bottom: 18px;
}

/* BANNER */
.banner {
  border-radius: 20px;
  overflow: hidden;
  margin-bottom: 20px;
  box-shadow: 0 20px 50px rgba(0,0,0,0.5);
}

.banner img {
  width: 100%;
  display: block;
}

/* BUTTONS */
.btn {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 12px;
  padding: 15px;
  margin: 12px 0;
  border-radius: 16px;
  text-decoration: none;
  font-weight: bold;
  color: white;
  transition: 0.3s ease;
}

.btn:hover {
  transform: scale(1.05);
}

/* PLATFORM BASE */
.platform {
  background: rgba(255,255,255,0.08);
  backdrop-filter: blur(10px);
}

/* LOGOS */
.logo {
  width: 22px;
}

/* BRAND COLORS */
.spotify { color: #1DB954; }
.apple { color: #ffffff; }
.audiomack { color: orange; }
.boomplay { color: #00d4ff; }

/* YOUTUBE */
.youtube {
  background: linear-gradient(135deg, #ff0033, #ff4b4b);
}

/* FOOTER */
.footer {
  margin-top: 20px;
  font-size: 12px;
  opacity: 0.6;
}
</style>
</head>

<body>

<div class="container">

<h1>Bend Down Select 🔥</h1>
<div class="sub">Tap your platform below 🎧</div>

<!-- COVER IMAGE -->
<div class="banner">
  <img src="https://raw.githubusercontent.com/omk-store/omotaker/main/A7D70F9C-D928-4A18-BAAD-ED8908BEBC77.png">
</div>

<!-- STREAMING -->
<a href="https://open.spotify.com/track/591YkWluaQeC3tGMWhSFWu" class="btn platform spotify" target="_blank">
  <img src="https://cdn-icons-png.flaticon.com/512/174/174872.png" class="logo">
  Spotify
</a>

<a href="https://music.apple.com/ng/album/bend-down-select/1829791125?i=1829791127" class="btn platform apple" target="_blank">
  <img src="https://cdn-icons-png.flaticon.com/512/731/731985.png" class="logo">
  Apple Music
</a>

<a href="https://audiomack.com/iam_omotaker/song/bend-down-select-1449797" class="btn platform audiomack" target="_blank">
  <img src="https://cdn-icons-png.flaticon.com/512/5968/5968885.png" class="logo">
  Audiomack
</a>

<a href="https://www.boomplay.com/songs/212979254" class="btn platform boomplay" target="_blank">
  <img src="https://cdn-icons-png.flaticon.com/512/727/727269.png" class="logo">
  Boomplay
</a>

<!-- YOUTUBE -->
<a href="https://youtu.be/7qlRs1gDnMI" class="btn youtube" target="_blank">
  <img src="https://cdn-icons-png.flaticon.com/512/1384/1384060.png" class="logo">
  Watch on YouTube
</a>

<!-- TIKTOK LAST -->
<a href="https://vt.tiktok.com/ZS9LFrn8pEQJE-RA0My/" class="btn platform" target="_blank">
  <img src="https://cdn-icons-png.flaticon.com/512/3046/3046121.png" class="logo">
  Use on TikTok
</a>

<div class="footer">
  OMK • Omo Taker 🐺
</div>

</div>

</body>
</html>
