<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Bend Down Select - Omo Taker</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background:
    radial-gradient(circle at 20% 20%, rgba(0,240,255,0.12), transparent 28%),
    radial-gradient(circle at 80% 80%, rgba(255,0,200,0.12), transparent 30%),
    #020617;
  color: white;
  display: flex;
  justify-content: center;
}

.container {
  width: 90%;
  max-width: 420px;
  text-align: center;
}

/* IMAGE */
.banner {
  border-radius: 20px;
  overflow: hidden;
  margin: 20px 0 15px;
  box-shadow: 0 20px 50px rgba(0,0,0,0.5);
}
.banner img {
  width: 100%;
  display: block;
}

/* TEXT */
h1 {
  font-size: 28px;
  margin: 10px 0 5px;
}
.sub {
  opacity: 0.8;
  margin-bottom: 18px;
}

/* BUTTON */
.btn {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 12px;
  padding: 16px;
  margin: 12px 0;
  border-radius: 20px;
  text-decoration: none;
  font-weight: bold;
  font-size: 18px;
  color: white;
  background: rgba(255,255,255,0.06);
  border: 1px solid rgba(255,255,255,0.08);
  transition: 0.3s ease;
}

.btn:hover {
  transform: scale(1.05);
}

/* LOGO */
.logo {
  width: 26px;
}

/* COLORS + GLOW */
.spotify {
  color: #1DB954;
  border-color: #1DB954;
  box-shadow: 0 0 18px rgba(29,185,84,0.25);
}

.apple {
  color: #ffffff;
  border-color: rgba(255,255,255,0.3);
}

.audiomack {
  color: orange;
  border-color: orange;
  box-shadow: 0 0 18px rgba(255,165,0,0.25);
}

.boomplay {
  color: #00d4ff;
  border-color: #00d4ff;
  box-shadow: 0 0 18px rgba(0,212,255,0.25);
}

.youtube {
  background: linear-gradient(135deg, #ff0033, #ff4b4b);
  border: none;
  box-shadow: 0 0 25px rgba(255,0,0,0.4);
}

.tiktok {
  border-color: rgba(255,255,255,0.2);
}

/* FOOTER */
.footer {
  margin-top: 20px;
  font-size: 12px;
  opacity: 0.6;
}
</style>
</head>

<body>

<div class="container">

<!-- IMAGE -->
<div class="banner">
  <img src="https://raw.githubusercontent.com/omk-store/omotaker/main/A7D70F9C-D928-4A18-BAAD-ED8908BEBC77.png">
</div>

<!-- TEXT -->
<h1>Bend Down Select 🔥</h1>
<div class="sub">Tap your platform below 🎧</div>

<!-- BUTTONS -->

<a href="https://open.spotify.com/track/591YkWluaQeC3tGMWhSFWu" class="btn spotify" target="_blank">
  <img src="https://upload.wikimedia.org/wikipedia/commons/8/84/Spotify_icon.svg" class="logo">
  Spotify
</a>

<a href="https://music.apple.com/ng/album/bend-down-select/1829791125?i=1829791127" class="btn apple" target="_blank">
  <img src="https://upload.wikimedia.org/wikipedia/commons/f/fa/Apple_logo_black.svg" class="logo" style="filter:invert(1);">
  Apple Music
</a>

<a href="https://audiomack.com/iam_omotaker/song/bend-down-select-1449797" class="btn audiomack" target="_blank">
  🎧 Audiomack
</a>

<a href="https://www.boomplay.com/songs/212979254" class="btn boomplay" target="_blank">
  🔊 Boomplay
</a>

<a href="https://youtu.be/7qlRs1gDnMI" class="btn youtube" target="_blank">
  ▶️ Watch on YouTube
</a>

<a href="https://vt.tiktok.com/ZS9LFrn8pEQJE-RA0My/" class="btn tiktok" target="_blank">
  🎵 Use on TikTok
</a>

<!-- FOOTER -->
<div class="footer">
  OMK • Omo Taker 🐺
</div>

</div>

</body>
</html>
