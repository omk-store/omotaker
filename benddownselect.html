<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Bend Down Select - Omo Taker</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #020617;
  color: white;
  display: flex;
  justify-content: center;
}

.container {
  width: 90%;
  max-width: 420px;
  text-align: center;
}

/* IMAGE */
.banner {
  border-radius: 20px;
  overflow: hidden;
  margin: 20px 0 15px;
  box-shadow: 0 0 40px rgba(255,140,0,0.3);
}
.banner img {
  width: 100%;
  display: block;
}

/* TEXT */
h1 {
  font-size: 26px;
  margin: 10px 0 5px;
}
.sub {
  opacity: 0.8;
  margin-bottom: 20px;
}

/* BUTTON */
.btn {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 12px;
  padding: 20px;
  margin: 14px 0;
  border-radius: 25px;
  text-decoration: none;
  font-weight: bold;
  font-size: 18px;
  color: white;
  transition: 0.3s ease;
}

/* SPOTIFY */
.spotify {
  background: linear-gradient(135deg, #1DB954, #1ed760);
  box-shadow: 0 0 30px rgba(29,185,84,0.6);
}

/* APPLE */
.apple {
  background: rgba(255,255,255,0.08);
  border: 1px solid rgba(255,255,255,0.2);
}

.btn:hover {
  transform: scale(1.06);
}

/* LOGO */
.logo {
  width: 26px;
}

/* FOOTER */
.footer {
  margin-top: 25px;
  font-size: 13px;
  opacity: 0.6;
}
</style>
</head>

<body>

<div class="container">

<!-- IMAGE -->
<div class="banner">
  <img src="https://raw.githubusercontent.com/omk-store/omotaker/main/A7D70F9C-D928-4A18-BAAD-ED8908BEBC77.png">
</div>

<!-- TEXT -->
<h1>Stream “Bend Down Select” 🔥</h1>
<div class="sub">Choose your platform 👇</div>

<!-- ONLY 2 BUTTONS -->

<a href="https://open.spotify.com/track/591YkWluaQeC3tGMWhSFWu" class="btn spotify" target="_blank">
  <img src="https://upload.wikimedia.org/wikipedia/commons/8/84/Spotify_icon.svg" class="logo">
  Play on Spotify
</a>

<a href="https://music.apple.com/ng/album/bend-down-select/1829791125?i=1829791127" class="btn apple" target="_blank">
  <img src="https://upload.wikimedia.org/wikipedia/commons/f/fa/Apple_logo_black.svg" class="logo" style="filter:invert(1);">
  Play on Apple Music
</a>

<!-- FOOTER -->
<div class="footer">
  OMK • Omo Taker 🐺
</div>

</div>

</body>
</html>
