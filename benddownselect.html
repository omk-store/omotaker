<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bend Down Select</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #020617;
  color: white;
  display: flex;
  justify-content: center;
  align-items: center;
  min-height: 100vh;
}

.container {
  width: 90%;
  max-width: 420px;
  padding: 20px;
  border-radius: 20px;
  background: rgba(255,255,255,0.04);
  backdrop-filter: blur(12px);
  text-align: center;
}

h1 {
  font-size: 26px;
  margin-bottom: 6px;
}

.sub {
  opacity: 0.8;
  margin-bottom: 16px;
}

.cover img {
  width: 100%;
  border-radius: 16px;
  margin-bottom: 18px;
}

/* BUTTON */
.btn {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 10px;
  padding: 14px;
  margin: 10px 0;
  border-radius: 14px;
  text-decoration: none;
  font-weight: bold;
  background: rgba(255,255,255,0.08);
  color: white;
  transition: 0.2s;
}

.btn:hover {
  transform: scale(1.04);
}

/* HIGHLIGHTS */
.spotify {
  background: #1DB954;
}

.youtube {
  background: #ff0033;
}

/* LOGO */
.logo {
  width: 22px;
  height: 22px;
  object-fit: contain;
}
</style>
</head>

<body>

<div class="container">

<h1>Bend Down Select 🔥</h1>
<div class="sub">Stream now everywhere 🎧🔥</div>

<div class="cover">
<img src="https://raw.githubusercontent.com/omk-store/omotaker/refs/heads/main/IMG_9918.jpeg">
</div>

<a href="https://open.spotify.com/track/591YkWluaQeC3tGMWhSFWu" class="btn spotify" target="_blank">
<img src="https://upload.wikimedia.org/wikipedia/commons/1/19/Spotify_logo_without_text.svg" class="logo">
Spotify
</a>

<a href="https://music.apple.com/ng/album/bend-down-select/1829791125?i=1829791127" class="btn" target="_blank">
<img src="https://upload.wikimedia.org/wikipedia/commons/f/fa/Apple_logo_black.svg" class="logo">
Apple Music
</a>

<a href="https://audiomack.com/iam_omotaker/song/bend-down-select-1449797" class="btn" target="_blank">
<img src="https://upload.wikimedia.org/wikipedia/commons/0/02/Audiomack_logo.png" class="logo">
Audiomack
</a>

<a href="https://www.boomplay.com/songs/212979254" class="btn" target="_blank">
<img src="https://upload.wikimedia.org/wikipedia/commons/5/5c/Boomplay_logo.png" class="logo">
Boomplay
</a>

<a href="https://vt.tiktok.com/ZS9LFrn8pEQJE-RA0My/" class="btn" target="_blank">
<img src="https://upload.wikimedia.org/wikipedia/en/a/a9/TikTok_logo.svg" class="logo">
Use on TikTok
</a>

<a href="https://youtu.be/7qlRs1gDnMI" class="btn youtube" target="_blank">
<img src="https://upload.wikimedia.org/wikipedia/commons/b/b8/YouTube_Logo_2017.svg" class="logo">
YouTube
</a>

</div>

</body>
</html>
