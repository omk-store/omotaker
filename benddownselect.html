<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">

<title>Bend Down Select - Omo Taker</title>

<style>
:root {
  --bg: #020617;
  --card: rgba(255,255,255,0.08);
  --card-border: rgba(255,255,255,0.12);
  --text-soft: rgba(255,255,255,0.72);
  --text-fade: rgba(255,255,255,0.52);
  --shadow-deep: 0 20px 60px rgba(0,0,0,0.45);
}

* {
  box-sizing: border-box;
}

html {
  scroll-behavior: smooth;
}

body {
  margin: 0;
  font-family: Arial, sans-serif;
  background:
    radial-gradient(circle at 20% 20%, rgba(0,240,255,0.12), transparent 28%),
    radial-gradient(circle at 80% 80%, rgba(255,0,200,0.12), transparent 30%),
    radial-gradient(circle at 50% 50%, rgba(124,58,237,0.08), transparent 38%),
    #020617;
  color: white;
  display: flex;
  justify-content: center;
  align-items: center;
  min-height: 100vh;
  text-align: center;
  overflow-x: hidden;
  position: relative;
}

/* MAIN AURAS */
body::before,
body::after {
  content: "";
  position: absolute;
  width: 560px;
  height: 560px;
  border-radius: 50%;
  filter: blur(140px);
  opacity: 0.34;
  pointer-events: none;
  z-index: 0;
}

body::before {
  background: linear-gradient(135deg, #00f0ff, #3b82f6);
  top: -80px;
  left: -100px;
  animation: driftOne 12s ease-in-out infinite alternate;
}

body::after {
  background: linear-gradient(135deg, #ff00c8, #7c3aed);
  bottom: -120px;
  right: -100px;
  animation: driftTwo 14s ease-in-out infinite alternate;
}

/* EXTRA MOVING GLOWS */
.bg-orb {
  position: absolute;
  border-radius: 50%;
  filter: blur(90px);
  opacity: 0.22;
  pointer-events: none;
  z-index: 0;
}

.bg-orb.one {
  width: 220px;
  height: 220px;
  background: #00e5ff;
  top: 12%;
  right: 16%;
  animation: orbFloat 10s ease-in-out infinite;
}

.bg-orb.two {
  width: 180px;
  height: 180px;
  background: #9333ea;
  bottom: 18%;
  left: 12%;
  animation: orbFloat 13s ease-in-out infinite reverse;
}

.bg-orb.three {
  width: 140px;
  height: 140px;
  background: #ff3cac;
  top: 58%;
  right: 8%;
  animation: orbFloat 11s ease-in-out infinite;
}

/* GRID / ENERGY LINES */
.grid {
  position: absolute;
  inset: 0;
  background-image:
    linear-gradient(rgba(255,255,255,0.03) 1px, transparent 1px),
    linear-gradient(90deg, rgba(255,255,255,0.03) 1px, transparent 1px);
  background-size: 34px 34px;
  mask-image: radial-gradient(circle at center, black 35%, transparent 88%);
  opacity: 0.25;
  pointer-events: none;
  z-index: 0;
}

/* FLOATING PARTICLES */
.particles,
.particles::before,
.particles::after {
  content: "";
  position: absolute;
  inset: 0;
  pointer-events: none;
  z-index: 0;
}

.particles {
  background-image:
    radial-gradient(circle, rgba(255,255,255,0.22) 1.2px, transparent 1.4px),
    radial-gradient(circle, rgba(0,240,255,0.28) 1.2px, transparent 1.6px),
    radial-gradient(circle, rgba(255,0,200,0.22) 1.2px, transparent 1.5px);
  background-size: 140px 140px, 180px 180px, 220px 220px;
  background-position: 0 0, 50px 80px, 120px 20px;
  animation: particleDrift 20s linear infinite;
  opacity: 0.55;
}

.particles::before {
  background-image:
    radial-gradient(circle, rgba(255,255,255,0.14) 1px, transparent 1.5px);
  background-size: 170px 170px;
  animation: particleDrift 28s linear infinite reverse;
  opacity: 0.45;
}

.particles::after {
  background-image:
    radial-gradient(circle, rgba(124,58,237,0.18) 1px, transparent 1.5px);
  background-size: 210px 210px;
  animation: particleDrift 32s linear infinite;
  opacity: 0.4;
}

/* CONTAINER */
.container {
  width: 90%;
  max-width: 430px;
  z-index: 2;
  position: relative;
  padding: 26px 18px 24px;
  border-radius: 28px;
  background: linear-gradient(
    180deg,
    rgba(255,255,255,0.08),
    rgba(255,255,255,0.04)
  );
  backdrop-filter: blur(18px);
  -webkit-backdrop-filter: blur(18px);
  border: 1px solid rgba(255,255,255,0.10);
  box-shadow:
    0 25px 80px rgba(0,0,0,0.45),
    inset 0 1px 0 rgba(255,255,255,0.10),
    0 0 0 1px rgba(255,255,255,0.03);
  animation: fadeIn 1.1s ease;
  overflow: hidden;
}

/* (rest unchanged) */

/* ===== CONTENT ===== */

</style>
</head>
