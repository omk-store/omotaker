<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bend Down Select - Omo Taker</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #020617;
  color: white;
  display: flex;
  justify-content: center;
  align-items: center;
  min-height: 100vh;
  text-align: center;
  overflow-x: hidden;
}

/* BACKGROUND GLOW */
body::before, body::after {
  content: "";
  position: absolute;
  width: 400px;
  height: 400px;
  border-radius: 50%;
  filter: blur(120px);
  opacity: 0.25;
}

body::before {
  background: radial-gradient(circle, #00ffcc, transparent);
  top: 10%;
  left: 10%;
}

body::after {
  background: radial-gradient(circle, #ffcc00, transparent);
  bottom: 10%;
  right: 10%;
}

.container {
  position: relative;
  z-index: 2;
  width: 90%;
  max-width: 420px;
  padding: 20px;
}

/* TITLE */
h1 {
  font-size: 30px;
  margin-bottom: 8px;
}

p {
  opacity: 0.7;
  margin-bottom: 20px;
  font-size: 14px;
}

/* BUTTONS */
.btn {
  display: block;
  padding: 16px;
  margin: 12px 0;
  border-radius: 14px;
  text-decoration: none;
  font-weight: bold;
  transition: 0.25s ease;
}

/* YOUTUBE TOP */
.youtube {
  background: linear-gradient(45deg, #ff0000, #ff4d4d);
  color: white;
  font-size: 16px;
  box-shadow: 0 0 20px rgba(255,0,0,0.4);
}

.youtube:hover {
  transform: scale(1.06);
}

/* OTHER PLATFORMS */
.platform {
  background: rgba(255,255,255,0.05);
  color: white;
  border: 1px solid rgba(255,255,255,0.1);
  backdrop-filter: blur(10px);
}

.platform:hover {
  background: rgba(255,255,255,0.12);
  transform: scale(1.03);
}

/* FOOTER */
.footer {
  margin-top: 25px;
  font-size: 12px;
  opacity: 0.5;
}
</style>
</head>

<body>

<div class="container">

<h1>Bend Down Select 🔥</h1>
<p>Watch first. Then stream anywhere 🎧</p>

<a href="https://youtu.be/7qlRs1gDnMI" class="btn youtube" target="_blank">
▶️ Watch on YouTube
</a>

<a href="https://open.spotify.com/track/591YkWluaQeC3tGMWhSFWu" class="btn platform" target="_blank">
🎵 Play on Spotify
</a>

<a href="https://music.apple.com/ng/album/bend-down-select/1829791125?i=1829791127" class="btn platform" target="_blank">
🍎 Listen on Apple Music
</a>

<a href="https://audiomack.com/iam_omotaker/song/benin-to-lagos" class="btn platform" target="_blank">
🔥 Stream on Audiomack
</a>

<a href="https://www.boomplay.com/songs/231357454" class="btn platform" target="_blank">
🎧 Play on Boomplay
</a>

<div class="footer">
OMK • Omo Taker 🐺
</div>

</div>

</body>
</html>
