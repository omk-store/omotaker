<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bend Down Select - Omo Taker</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #020617;
  color: white;
  display: flex;
  justify-content: center;
  align-items: center;
  min-height: 100vh;
  text-align: center;
}

/* GLOW BACKGROUND */
body::before, body::after {
  content: "";
  position: absolute;
  width: 400px;
  height: 400px;
  border-radius: 50%;
  filter: blur(120px);
  opacity: 0.25;
}

body::before {
  background: #00ffcc;
  top: 10%;
  left: 10%;
}

body::after {
  background: #ffcc00;
  bottom: 10%;
  right: 10%;
}

.container {
  width: 90%;
  max-width: 420px;
  z-index: 2;
}

/* TITLE */
h1 {
  font-size: 28px;
  margin-bottom: 10px;
}

p {
  opacity: 0.7;
  margin-bottom: 15px;
}

/* VIDEO */
.video {
  width: 100%;
  border-radius: 12px;
  overflow: hidden;
  margin-bottom: 15px;
}

iframe {
  width: 100%;
  height: 220px;
  border: none;
}

/* BUTTONS */
.btn {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 10px;
  padding: 14px;
  margin: 10px 0;
  border-radius: 12px;
  text-decoration: none;
  font-weight: bold;
  transition: 0.3s;
}

/* YOUTUBE */
.youtube {
  background: #ff0000;
  color: white;
}

/* PLATFORM */
.platform {
  background: rgba(255,255,255,0.08);
  color: white;
}

.btn:hover {
  transform: scale(1.05);
}

/* LOGOS */
.logo {
  width: 20px;
  height: 20px;
}

/* FOOTER */
.footer {
  margin-top: 20px;
  font-size: 12px;
  opacity: 0.5;
}
</style>
</head>

<body>

<div class="container">

<h1>Bend Down Select 🔥</h1>
<p>Watch & stream everywhere 🎧</p>

<!-- YOUTUBE VIDEO -->
<div class="video">
<iframe src="https://www.youtube.com/embed/7qlRs1gDnMI" allowfullscreen></iframe>
</div>

<!-- BUTTONS -->
<a href="https://youtu.be/7qlRs1gDnMI" class="btn youtube" target="_blank">
<img src="https://cdn-icons-png.flaticon.com/512/1384/1384060.png" class="logo">
Watch on YouTube
</a>

<a href="https://open.spotify.com/track/591YkWluaQeC3tGMWhSFWu" class="btn platform" target="_blank">
<img src="https://cdn-icons-png.flaticon.com/512/174/174872.png" class="logo">
Spotify
</a>

<a href="https://music.apple.com/ng/album/bend-down-select/1829791125?i=1829791127" class="btn platform" target="_blank">
<img src="https://cdn-icons-png.flaticon.com/512/731/731985.png" class="logo">
Apple Music
</a>

<a href="https://audiomack.com/iam_omotaker/song/benin-to-lagos" class="btn platform" target="_blank">
<img src="https://cdn-icons-png.flaticon.com/512/5968/5968885.png" class="logo">
Audiomack
</a>

<a href="https://www.boomplay.com/songs/231357454" class="btn platform" target="_blank">
<img src="https://cdn-icons-png.flaticon.com/512/727/727269.png" class="logo">
Boomplay
</a>

<div class="footer">
OMK • Omo Taker 🐺
</div>

</div>

</body>
</html>
