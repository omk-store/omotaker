<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Bend Down Select - Omo Taker</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  color: white;
  display: flex;
  justify-content: center;
  overflow-x: hidden;

  background: linear-gradient(-45deg, #020617, #0f172a, #020617, #111827);
  background-size: 400% 400%;
  animation: gradientMove 10s ease infinite;
}

@keyframes gradientMove {
  0% { background-position: 0% 50%; }
  50% { background-position: 100% 50%; }
  100% { background-position: 0% 50%; }
}

/* FLOATING PARTICLES */
body::before {
  content: "";
  position: fixed;
  width: 200%;
  height: 200%;
  background: radial-gradient(circle, rgba(255,255,255,0.08) 1px, transparent 1px);
  background-size: 50px 50px;
  animation: floatParticles 20s linear infinite;
  z-index: 0;
}

@keyframes floatParticles {
  from { transform: translateY(0); }
  to { transform: translateY(-200px); }
}

.container {
  width: 90%;
  max-width: 420px;
  text-align: center;
  position: relative;
  z-index: 2;
}

/* IMAGE */
.banner {
  border-radius: 20px;
  overflow: hidden;
  margin: 20px 0 15px;
  box-shadow: 0 0 50px rgba(255,140,0,0.4);
}
.banner img {
  width: 100%;
}

/* TEXT */
h1 {
  font-size: 26px;
  margin: 10px 0 5px;
}
.sub {
  opacity: 0.85;
  margin-bottom: 10px;
}

/* LOADER TEXT */
.loader-text {
  font-size: 14px;
  opacity: 0.7;
  margin-bottom: 10px;
  animation: fadePulse 1.5s infinite;
}

@keyframes fadePulse {
  0%,100% { opacity: 0.4; }
  50% { opacity: 1; }
}

/* BUTTON */
.btn {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 12px;
  padding: 20px;
  margin: 14px 0;
  border-radius: 25px;
  text-decoration: none;
  font-weight: bold;
  font-size: 18px;
  color: white;
  transition: 0.3s ease;
}

.spotify {
  background: linear-gradient(135deg, #1DB954, #1ed760);
  box-shadow: 0 0 30px rgba(29,185,84,0.7);
}

.apple {
  background: rgba(255,255,255,0.08);
  border: 1px solid rgba(255,255,255,0.2);
}

.btn:hover {
  transform: scale(1.06);
}

.logo {
  width: 26px;
}

.footer
