<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Everyday Vibe</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #020617;
  display: flex;
  justify-content: center;
  align-items: flex-start;
  padding: 20px 0;
}

/* FLOATING LIGHTS */
body::before,
body::after {
  content: "";
  position: absolute;
  width: 500px;
  height: 500px;
  border-radius: 50%;
  filter: blur(120px);
  opacity: 0.4;
  animation: float 10s infinite alternate ease-in-out;
  z-index: 0;
}

body::before {
  background: #1DB954;
  top: -100px;
  left: -100px;
}

body::after {
  background: #3b82f6;
  bottom: -100px;
  right: -100px;
}

@keyframes float {
  from { transform: translateY(0px); }
  to { transform: translateY(60px); }
}

/* CARD */
.card {
  width: 100%;
  max-width: 420px;
  border-radius: 22px;
  overflow: hidden;
  background: rgba(15,23,42,0.7);
  backdrop-filter: blur(20px);
  border: 1px solid rgba(255,255,255,0.06);
  box-shadow: 0 20px 80px rgba(0,0,0,0.9);
  z-index: 2;
}

/* IMAGE */
.banner {
  width: 100%;
  display: block;
}

/* CONTENT */
.content {
  padding: 20px;
  color: white;
}

/* TITLE */
.title {
  text-align: center;
  font-size: 20px;
  font-weight: 700;
  margin-bottom: 6px;
}

/* SUBTITLE */
.subtitle {
  text-align: center;
  font-size: 12px;
  opacity: 0.7;
  margin-bottom: 12px;
}

/* TAP TEXT */
.tap {
  text-align: center;
  font-size: 13px;
  font-weight: 600;
  margin-bottom: 16px;
  color: #22c55e;
  animation: blink 1.5s infinite;
}

@keyframes blink {
  0%,100% { opacity: 0.5; }
  50% { opacity: 1; }
}

/* PLATFORM */
.platform {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 14px;
  margin-bottom: 12px;
  border-radius: 14px;
  background: rgba(255,255,255,0.03);
  border: 1px solid rgba(255,255,255,0.06);
  transition: 0.25s;
}

.platform:hover {
  transform: scale(1.02);
}

/* TEXT */
.platform span {
  font-weight: 600;
  font-size: 14px;
}

/* SPOTIFY */
.spotify span {
  color: #1DB954;
}

/* BUTTON */
.btn {
  padding: 8px 16px;
  border-radius: 999px;
  text-decoration: none;
  font-size: 12px;
  font-weight: bold;
}

/* SPOTIFY BUTTON */
.spotify-btn {
  background: #1DB954;
  color: black;
}

/* APPLE BUTTON */
.apple-btn {
  background: #ffffff;
  color: black;
}

/* SUBMIT SECTION (COMPACT) */
.submit-box {
  margin-top: 14px;
  padding: 14px;
  border-radius: 16px;
  background: rgba(255,255,255,0.05);
  border: 1px solid rgba(255,255,255,0.08);
  text-align: center;
}

.submit-box h3 {
  margin: 0 0 5px;
  font-size: 15px;
}

.submit-box p {
  margin: 0 0 10px;
  font-size: 11px;
  opacity: 0.7;
}

.submit-btn {
  display: block;
  padding: 11px;
  border-radius: 999px;
  text-decoration: none;
  font-weight: bold;
  font-size: 12px;
  background: linear-gradient(90deg,#00ff9f,#00d4ff);
  color: black;
}

/* FOOTER */
.footer {
  text-align: center;
  font-size: 11px;
  opacity: 0.5;
  margin-top: 12px;
}
</style>
</head>

<body>

<div class="card">

<img class="banner" src="https://raw.githubusercontent.com/omk-store/omotaker/refs/heads/main/6AC61EB2-B4B3-4CB6-927D-9B4E8C7AF9E8.jpeg">

<div class="content">

<div class="title">Nigeria Top 100 Afrobeats 🇳🇬🔥</div>
<div class="subtitle">Updated Daily • Real Hits Only</div>

<div class="tap">Tap to stream 🎧👇</div>

<div class="platform spotify">
  <span>Spotify</span>
  <a href="https://open.spotify.com/playlist/1Ox7VYqq4rFq1gYPPRP8Fh?si=HqDyzh4TTea6XySKb3oJHw" class="btn spotify-btn">▶ Play</a>
</div>

<div class="platform">
  <span>Apple Music</span>
  <a href="https://music.apple.com/ng/playlist/everyday-vibe/pl.u-DdAN8l3TN2ANagg" class="btn apple-btn">▶ Play</a>
</div>

<div class="submit-box">
  <h3>Want Your Song Here? 🚀</h3>
  <p>Submit your sound for Everyday Vibe review.</p>
  <a href="https://www.omotaker.com/submit.html" class="submit-btn">Submit Your Song 🏆</a>
</div>

<div class="footer">
  Powered by Everyday Vibe 🌍
</div>

</div>

</div>

</body>
</html>
